# ─────────────────────────────────────────────
# Shared Utility Types
# ─────────────────────────────────────────────

"""
A date range with optional month and day granularity.
"""
type DateRange {
  year: Int!
  month: Int
  day: Int
}

"""
Relay-compatible pagination info.
"""
type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

# ─────────────────────────────────────────────
# Root Query Type
# ─────────────────────────────────────────────

type Query {
  """
  Fetch the authenticated LinkedIn member.
  Maps to GET /v2/me
  """
  me: Member

  """
  Fetch a LinkedIn member by URN.
  Maps to GET /v2/members/{memberUrn}
  """
  member(urn: URN!): Member

  """
  Fetch a LinkedIn company by URN.
  Maps to GET /v2/organizations/{organizationId}
  """
  company(urn: URN!): Company

  """
  Fetch a LinkedIn school by URN.
  """
  school(urn: URN!): School

  """
  Fetch a job posting by URN.
  Maps to GET /v2/simpleJobPostings/{jobPostingUrn}
  """
  jobPosting(urn: URN!): JobPosting

  """
  Search for members, companies, or jobs.
  Maps to GET /v2/search
  """
  search(query: String!, entityTypes: [String!], first: Int, after: String): [SearchResult!]

  """
  Fetch an ad account by URN.
  Maps to GET /v2/adAccounts/{adAccountId}
  """
  adAccount(urn: URN!): AdAccount

  """
  Fetch a campaign by URN.
  Maps to GET /v2/adCampaignsV2/{campaignId}
  """
  campaign(urn: URN!): Campaign

  """
  Fetch a Lead Gen Form by URN.
  Maps to GET /v2/leadGenForms/{leadGenFormUrn}
  """
  leadGenForm(urn: URN!): LeadGenForm

  """
  Fetch a LinkedIn Group by URN.
  """
  group(urn: URN!): Group

  """
  Fetch a LinkedIn Learning course by URN.
  Maps to GET /v2/learningAssets/{learningAssetUrn}
  """
  learningCourse(urn: URN!): LearningCourse

  """
  Fetch a Sales Navigator account by URN.
  Maps to GET /v2/salesNavigatorAccounts/{accountId}
  """
  salesAccount(urn: URN!): SalesAccount

  """
  Fetch a post by URN.
  Maps to GET /v2/posts/{postUrn}
  """
  post(urn: URN!): Post

  """
  Fetch a conversation by URN.
  Maps to GET /v2/conversations/{conversationId}
  """
  conversation(urn: URN!): Conversation

  """
  Fetch analytics for a company page.
  Maps to GET /v2/organizationalEntityShareStatistics
  """
  companyAnalytics(companyUrn: URN!, startDate: DateTime, endDate: DateTime): Analytics

  """
  Fetch profile view summary for the authenticated member.
  Maps to GET /v2/profileViews
  """
  profileViewSummary: ProfileViewSummary
}
