- type: Features
  data:
  - name: Sign In with LinkedIn
    description: OpenID Connect-based authentication enabling users to sign in to
      third-party applications with their LinkedIn credentials.
  - name: Share on LinkedIn
    description: Enable users to share content from your application directly to their
      LinkedIn feed.
  - name: Verified on LinkedIn
    description: Display verified professional credentials and certifications from
      LinkedIn on third-party platforms.
  - name: Campaign Management
    description: Programmatically create, manage, and optimize B2B advertising campaigns
      with targeting and budget controls.
  - name: Audience Insights
    description: Access aggregated audience demographics and firmographic data for
      ad targeting and market research.
  - name: Conversions API
    description: Send online and offline conversion events for attribution and campaign
      optimization.
  - name: Lead Gen Forms
    description: Collect leads directly from LinkedIn ads with pre-filled forms using
      member profile data.
  - name: Job Posting
    description: Programmatically publish and manage job listings on LinkedIn through
      the Talent Solutions API.
  - name: Recruiter System Connect
    description: Integrate applicant tracking systems with LinkedIn Recruiter for
      seamless candidate management.
  - name: Learning Activity Reports
    description: Retrieve learner engagement, completions, and activity data from
      LinkedIn Learning.
  - name: Compliance Archiving
    description: Archive and monitor LinkedIn messages and activities for regulatory
      compliance in regulated industries.
  - name: Data Portability
    description: Access member and organization data portability endpoints for Digital
      Markets Act compliance.
- type: UseCases
  data:
  - name: Social Login
    description: Implement Sign In with LinkedIn for professional identity verification
      and streamlined authentication.
  - name: B2B Advertising
    description: Create and manage targeted advertising campaigns reaching professional
      audiences by industry, job title, and company.
  - name: Marketing Analytics
    description: Retrieve campaign performance metrics, audience insights, and conversion
      attribution for marketing optimization.
  - name: Talent Acquisition
    description: Post jobs, manage candidates, and integrate ATS systems with LinkedIn
      Recruiter for streamlined hiring.
  - name: Sales Intelligence
    description: Integrate CRM systems with LinkedIn Sales Navigator for lead enrichment
      and relationship insights.
  - name: Employee Learning
    description: Track and report on LinkedIn Learning usage, completions, and skill
      development across organizations.
  - name: Regulatory Compliance
    description: Archive communications and activities on LinkedIn for compliance
      with financial industry regulations.
  - name: Content Distribution
    description: Automate sharing of articles, updates, and media content to LinkedIn
      feeds and company pages.
- type: Integrations
  data:
  - name: Salesforce
    description: LinkedIn Sales Navigator integration with Salesforce CRM for lead
      and account synchronization.
  - name: Microsoft Dynamics
    description: Native integration with Microsoft Dynamics 365 for sales intelligence
      and lead management.
  - name: HubSpot
    description: LinkedIn Ads integration with HubSpot for campaign management and
      lead synchronization.
  - name: Postman
    description: Official Postman workspaces for all LinkedIn API business lines with
      pre-built collections.
  - name: OpenID Connect
    description: Standards-based authentication using OpenID Connect for Sign In with
      LinkedIn.
- type: Solutions
  data:
  - name: Consumer Solutions
    description: Sign In with LinkedIn, Share on LinkedIn, and Verified on LinkedIn
      for consumer-facing integrations.
  - name: Marketing Solutions
    description: B2B advertising platform with campaign management, audience targeting,
      lead generation, and analytics.
  - name: Talent Solutions
    description: Job posting, recruiter system connect, and apply with LinkedIn for
      talent acquisition and ATS integration.
  - name: Learning Solutions
    description: LinkedIn Learning integration for employee development tracking,
      content access, and activity reporting.
  - name: Sales Solutions
    description: LinkedIn Sales Navigator API for CRM sync, display services, and
      sales analytics.
  - name: Compliance Solutions
    description: Message archiving and activity monitoring for regulated industries
      requiring communications governance.
  - name: Regulatory Solutions
    description: Data portability and advertiser transparency APIs for Digital Markets
      Act and regulatory compliance.
