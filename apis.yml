aid: linkedin
name: LinkedIn
description: LinkedIn is a professional networking platform providing APIs for consumer
  integrations (Sign In, Share, Verified on LinkedIn), marketing solutions (ad campaigns,
  audiences, conversions, analytics), talent solutions (job posting, recruiter system
  connect), learning solutions (activity reports, content), sales navigator (CRM sync,
  display, analytics), compliance (message archiving), and regulatory data portability.
