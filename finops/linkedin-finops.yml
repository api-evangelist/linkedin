specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: LinkedIn
providerId: linkedin
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - Marketing
  - Recruiting
  - Sales Enablement
  - Social Media
description: 'FOCUS-aligned FinOps for LinkedIn: APIs themselves are free, but they front paid LinkedIn
  products. Spend lives in three places — ad spend (Marketing API drives Campaign Manager invoices),
  per-seat subscriptions (Recruiter, Sales Navigator, Learning), and a no-charge consumer surface (Sign
  In / Share / Verified / Portability).'
sources:
  - https://www.linkedin.com/developers/products
  - https://learn.microsoft.com/en-us/linkedin/marketing/quick-start
  - https://learn.microsoft.com/en-us/linkedin/shared/api-guide/concepts/rate-limits
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: LinkedIn Corporation
serviceCategory: Marketing / Recruiting / Professional Networking
billingModel:
  pricingCategory: Subscription + Ad Spend
  billingFrequency: Monthly
  billingCurrency: USD/EUR/GBP
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Adjustment
    - Credit
focusColumns:
  ServiceName: LinkedIn
  ServiceCategory: Marketing / Recruiting
  ProviderName: LinkedIn
  PublisherName: LinkedIn Corporation
  InvoiceIssuerName: LinkedIn Ireland Unlimited Company / LinkedIn Corporation
  BillingCurrency: USD
meters:
  - name: ad_spend
    unit: USD
    aggregation: sum
    dimensions:
      - ad_account
      - campaign
      - creative
      - objective
      - country
  - name: ad_impressions
    unit: impression
    aggregation: sum
    dimensions:
      - campaign
      - audience
  - name: recruiter_seats
    unit: seat
    aggregation: count
    dimensions:
      - contract
      - product_variant
  - name: sales_navigator_seats
    unit: seat
    aggregation: count
    dimensions:
      - contract
      - product_variant
  - name: learning_seats
    unit: seat
    aggregation: count
    dimensions:
      - contract
  - name: api_calls
    unit: request
    aggregation: sum
    dimensions:
      - api_product
      - endpoint
      - app_tier
principles:
  - name: Visibility
    description: Use Campaign Manager + Marketing Reporting API for ad spend; LinkedIn Business Manager
      for invoices; the Developer Portal Analytics tab for per-app / per-endpoint API usage and tier
      headroom.
  - name: Allocation
    description: Tag campaigns, accounts, and Recruiter / Sales Navigator seats with cost-center / business-unit
      metadata; allocate ad spend by Campaign objective and Recruiter seats by hiring team.
  - name: Optimization
    description: Use Conversions API to lift attribution and reduce wasted spend; reclaim idle Recruiter
      / Sales Navigator seats; upgrade apps from Development to Standard tier only when production volume
      justifies the partner-program effort.
  - name: Accountability
    description: Assign one owner per LinkedIn ad account and one per Recruiter / Sales Navigator contract;
      review monthly seat utilization and CPM / CPC against plan targets.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
