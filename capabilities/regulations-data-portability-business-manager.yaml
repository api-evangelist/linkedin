naftiko: 1.0.0-alpha2
info:
  label: LinkedIn Pages Data Portability API — Business Manager
  description: 'LinkedIn Pages Data Portability API — Business Manager. 1 operations. Lead operation: LinkedIn Get Business
    Manager Account Relationships. Self-contained Naftiko capability covering one Linkedin business surface.'
  tags:
  - Linkedin
  - Business Manager
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    LINKEDIN_API_KEY: LINKEDIN_API_KEY
capability:
  consumes:
  - type: http
    namespace: regulations-data-portability-business-manager
    baseUri: https://api.linkedin.com
    description: LinkedIn Pages Data Portability API — Business Manager business capability. Self-contained, no shared references.
    resources:
    - name: rest-dmaBusinessManagerAccountRelationships
      path: /rest/dmaBusinessManagerAccountRelationships
      operations:
      - name: getbusinessmanagerrelationships
        method: GET
        description: LinkedIn Get Business Manager Account Relationships
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: businessManagerAccount
          in: query
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.LINKEDIN_API_KEY}}'
  exposes:
  - type: rest
    namespace: regulations-data-portability-business-manager-rest
    port: 8080
    description: REST adapter for LinkedIn Pages Data Portability API — Business Manager. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/dmabusinessmanageraccountrelationships
      name: rest-dmabusinessmanageraccountrelationships
      description: REST surface for rest-dmaBusinessManagerAccountRelationships.
      operations:
      - method: GET
        name: getbusinessmanagerrelationships
        description: LinkedIn Get Business Manager Account Relationships
        call: regulations-data-portability-business-manager.getbusinessmanagerrelationships
        with:
          businessManagerAccount: rest.businessManagerAccount
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: regulations-data-portability-business-manager-mcp
    port: 9090
    transport: http
    description: MCP adapter for LinkedIn Pages Data Portability API — Business Manager. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: linkedin-get-business-manager-account
      description: LinkedIn Get Business Manager Account Relationships
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: regulations-data-portability-business-manager.getbusinessmanagerrelationships
      with:
        businessManagerAccount: tools.businessManagerAccount
      outputParameters:
      - type: object
        mapping: $.
