naftiko: 1.0.0-alpha2
info:
  label: LinkedIn Content And Community
  description: Unified workflow for content marketers to create rich ad content, manage organization pages, track engagement,
    and monitor social actions -- combining content APIs and community management.
  tags:
  - LinkedIn
  - Content Marketing
  - Community Management
  - Social Media
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    LINKEDIN_OAUTH_TOKEN: LINKEDIN_OAUTH_TOKEN
capability:
  consumes:
  - type: http
    namespace: marketing-content
    baseUri: https://api.linkedin.com
    description: LinkedIn Content APIs for rich content management.
    authentication:
      type: bearer
      token: '{{LINKEDIN_OAUTH_TOKEN}}'
    resources:
    - name: inmail-contents
      path: /rest/inMailContents
      description: InMail content management.
      operations:
      - name: create-inmail-content
        method: POST
        description: Create InMail content.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: batch-get-inmail-content
        method: GET
        description: Batch retrieve InMail content.
        inputParameters:
        - name: ids
          in: query
          type: string
          required: false
          description: InMail content IDs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: send-test-inmail
        method: POST
        description: Send a test InMail.
        inputParameters:
        - name: action
          in: query
          type: string
          required: false
          description: Action type
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: inmail-content-by-id
      path: /rest/inMailContents/{adInMailContentId}
      description: Individual InMail content operations.
      operations:
      - name: get-inmail-content
        method: GET
        description: Retrieve InMail content by ID.
        inputParameters:
        - name: adInMailContentId
          in: path
          type: string
          required: true
          description: InMail content ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-inmail-content
        method: POST
        description: Update InMail content.
        inputParameters:
        - name: adInMailContentId
          in: path
          type: string
          required: true
          description: InMail content ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: images
      path: /images
      description: Image upload management.
      operations:
      - name: initialize-image-upload
        method: POST
        description: Initialize image upload.
        inputParameters:
        - name: action
          in: query
          type: string
          required: false
          description: Action type
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: videos
      path: /videos
      description: Video upload management.
      operations:
      - name: initialize-video-upload
        method: POST
        description: Initialize video upload.
        inputParameters:
        - name: action
          in: query
          type: string
          required: false
          description: Action type
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: posts
      path: /posts
      description: Post management.
      operations:
      - name: create-post
        method: POST
        description: Create document or content post.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-posts
        method: GET
        description: Fetch multiple posts.
        inputParameters:
        - name: ids
          in: query
          type: string
          required: false
          description: Post IDs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: creatives
      path: /creatives
      description: Creative management.
      operations:
      - name: create-creative
        method: POST
        description: Create a dynamic spotlight or other ad creative.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: search-creatives
        method: GET
        description: Search for creatives.
        inputParameters:
        - name: q
          in: query
          type: string
          required: false
          description: Query type
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: conversation-ads
      path: /conversationAds
      description: Conversation ad management.
      operations:
      - name: create-sponsored-conversation
        method: POST
        description: Create a sponsored conversation.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-sponsored-conversations
        method: GET
        description: Get multiple sponsored conversations.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: documents
      path: /documents
      description: Document upload management.
      operations:
      - name: initialize-document-upload
        method: POST
        description: Initialize document upload.
        inputParameters:
        - name: action
          in: query
          type: string
          required: false
          description: Action type
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: marketing-community
    baseUri: https://api.linkedin.com
    description: LinkedIn Community Management API.
    authentication:
      type: bearer
      token: '{{LINKEDIN_OAUTH_TOKEN}}'
    resources:
    - name: shares
      path: /shares
      description: Create and manage shares.
      operations:
      - name: create-share
        method: POST
        description: Create a share with a company mention.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: event-subscriptions
      path: /eventSubscriptions
      description: Event subscription management.
      operations:
      - name: get-notifications
        method: GET
        description: Retrieve notifications for the authenticated member's organization.
        inputParameters:
        - name: q
          in: query
          type: string
          required: false
          description: Query type
        - name: eventType
          in: query
          type: string
          required: false
          description: Event type filter
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: follower-statistics
      path: /organizationalEntityFollowerStatistics
      description: Organization follower statistics.
      operations:
      - name: get-follower-statistics
        method: GET
        description: Retrieve time-bound follower statistics.
        inputParameters:
        - name: q
          in: query
          type: string
          required: false
          description: Query type
        - name: organizationalEntity
          in: query
          type: string
          required: false
          description: Organization URN
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: page-statistics
      path: /organizationPageStatistics
      description: Organization page statistics.
      operations:
      - name: get-page-statistics
        method: GET
        description: Retrieve lifetime page statistics.
        inputParameters:
        - name: q
          in: query
          type: string
          required: false
          description: Query type
        - name: organization
          in: query
          type: string
          required: false
          description: Organization URN
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: share-statistics
      path: /organizationalEntityShareStatistics
      description: Organization share statistics.
      operations:
      - name: get-share-statistics
        method: GET
        description: Retrieve time-bound share statistics.
        inputParameters:
        - name: q
          in: query
          type: string
          required: false
          description: Query type
        - name: organizationalEntity
          in: query
          type: string
          required: false
          description: Organization URN
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: organizations
      path: /organizations
      description: Organization lookup.
      operations:
      - name: find-organization-brands
        method: GET
        description: Find administered organization brands by parent org.
        inputParameters:
        - name: q
          in: query
          type: string
          required: false
          description: Query type
        - name: parent
          in: query
          type: string
          required: false
          description: Parent organization URN
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: organization-by-id
      path: /organizations/{organization_id}
      description: Organization lookup by ID.
      operations:
      - name: get-organization-by-id
        method: GET
        description: Look up organization by ID.
        inputParameters:
        - name: organization_id
          in: path
          type: string
          required: true
          description: Organization ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: network-sizes
      path: /networkSizes/urn:li:organization:{organization_id}
      description: Organization follower count.
      operations:
      - name: get-follower-count
        method: GET
        description: Retrieve organization follower count.
        inputParameters:
        - name: organization_id
          in: path
          type: string
          required: true
          description: Organization ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: organization-acls
      path: /organizationAcls
      description: Organization access controls.
      operations:
      - name: find-organization-access-control
        method: GET
        description: Find organization access control.
        inputParameters:
        - name: q
          in: query
          type: string
          required: false
          description: Query type
        - name: organization
          in: query
          type: string
          required: false
          description: Organization URN
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: people-typeahead
      path: /peopleTypeahead
      description: People search within organization followers.
      operations:
      - name: search-followers-by-keyword
        method: GET
        description: Search organization followers by keyword.
        inputParameters:
        - name: q
          in: query
          type: string
          required: false
          description: Query type
        - name: keywords
          in: query
          type: string
          required: false
          description: Search keywords
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8081
    namespace: content-community-api
    description: Unified REST API for LinkedIn content creation and community management.
    resources:
    - path: /v1/posts
      name: posts
      operations:
      - method: POST
        name: create-post
        description: Create a post.
        call: marketing-content.create-post
      - method: GET
        name: get-posts
        description: Fetch multiple posts.
        call: marketing-content.get-posts
    - path: /v1/shares
      name: shares
      operations:
      - method: POST
        name: create-share
        description: Create a share with company mention.
        call: marketing-community.create-share
    - path: /v1/creatives
      name: creatives
      operations:
      - method: POST
        name: create-creative
        description: Create an ad creative.
        call: marketing-content.create-creative
      - method: GET
        name: search-creatives
        description: Search for creatives.
        call: marketing-content.search-creatives
    - path: /v1/inmail-contents
      name: inmail-contents
      operations:
      - method: POST
        name: create-inmail-content
        description: Create InMail content.
        call: marketing-content.create-inmail-content
    - path: /v1/conversation-ads
      name: conversation-ads
      operations:
      - method: POST
        name: create-sponsored-conversation
        description: Create a sponsored conversation.
        call: marketing-content.create-sponsored-conversation
      - method: GET
        name: get-sponsored-conversations
        description: Get sponsored conversations.
        call: marketing-content.get-sponsored-conversations
    - path: /v1/images
      name: images
      operations:
      - method: POST
        name: initialize-image-upload
        description: Initialize image upload.
        call: marketing-content.initialize-image-upload
    - path: /v1/videos
      name: videos
      operations:
      - method: POST
        name: initialize-video-upload
        description: Initialize video upload.
        call: marketing-content.initialize-video-upload
    - path: /v1/organizations/{organization_id}
      name: organization-by-id
      operations:
      - method: GET
        name: get-organization-by-id
        description: Look up organization by ID.
        call: marketing-community.get-organization-by-id
    - path: /v1/follower-statistics
      name: follower-statistics
      operations:
      - method: GET
        name: get-follower-statistics
        description: Retrieve follower statistics.
        call: marketing-community.get-follower-statistics
    - path: /v1/page-statistics
      name: page-statistics
      operations:
      - method: GET
        name: get-page-statistics
        description: Retrieve page statistics.
        call: marketing-community.get-page-statistics
  - type: mcp
    port: 9091
    namespace: content-community-mcp
    transport: http
    description: MCP server for AI-assisted LinkedIn content and community management.
    tools:
    - name: create-post
      description: Create a post.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: marketing-content.create-post
    - name: get-posts
      description: Fetch multiple posts.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-content.get-posts
    - name: create-share
      description: Create a share with company mention.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: marketing-community.create-share
    - name: create-creative
      description: Create an ad creative.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: marketing-content.create-creative
    - name: search-creatives
      description: Search for creatives.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-content.search-creatives
    - name: create-inmail-content
      description: Create InMail content.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: marketing-content.create-inmail-content
    - name: get-inmail-content
      description: Retrieve InMail content by ID.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-content.get-inmail-content
    - name: create-sponsored-conversation
      description: Create a sponsored conversation.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: marketing-content.create-sponsored-conversation
    - name: initialize-image-upload
      description: Initialize image upload.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: marketing-content.initialize-image-upload
    - name: initialize-video-upload
      description: Initialize video upload.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: marketing-content.initialize-video-upload
    - name: initialize-document-upload
      description: Initialize document upload.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: marketing-content.initialize-document-upload
    - name: get-organization-by-id
      description: Look up organization by ID.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-community.get-organization-by-id
    - name: get-follower-statistics
      description: Retrieve follower statistics.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-community.get-follower-statistics
    - name: get-page-statistics
      description: Retrieve page statistics.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-community.get-page-statistics
    - name: get-share-statistics
      description: Retrieve share statistics.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-community.get-share-statistics
    - name: get-follower-count
      description: Retrieve organization follower count.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-community.get-follower-count
    - name: get-notifications
      description: Retrieve social action notifications.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-community.get-notifications
