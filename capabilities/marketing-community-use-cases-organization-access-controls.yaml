naftiko: 1.0.0-alpha2
info:
  label: Community Management — Use Cases > Organization Access Controls
  description: 'Community Management — Use Cases > Organization Access Controls. 1 operations. Lead operation: LinkedIn Find
    Organization Access Control. Self-contained Naftiko capability covering one Linkedin business surface.'
  tags:
  - Linkedin
  - Use Cases > Organization Access Controls
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    LINKEDIN_API_KEY: LINKEDIN_API_KEY
capability:
  consumes:
  - type: http
    namespace: marketing-community-use-cases-organization-access-controls
    baseUri: https://api.linkedin.com
    description: Community Management — Use Cases > Organization Access Controls business capability. Self-contained, no shared
      references.
    resources:
    - name: organizationAcls
      path: /organizationAcls
      operations:
      - name: getfindorganizationaccesscontrol
        method: GET
        description: LinkedIn Find Organization Access Control
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: X-Restli-Protocol-Version
          in: header
          type: string
        - name: Linkedin-Version
          in: header
          type: string
        - name: q
          in: query
          type: string
        - name: organization
          in: query
          type: string
  exposes:
  - type: rest
    namespace: marketing-community-use-cases-organization-access-controls-rest
    port: 8080
    description: REST adapter for Community Management — Use Cases > Organization Access Controls. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/organizationacls
      name: organizationacls
      description: REST surface for organizationAcls.
      operations:
      - method: GET
        name: getfindorganizationaccesscontrol
        description: LinkedIn Find Organization Access Control
        call: marketing-community-use-cases-organization-access-controls.getfindorganizationaccesscontrol
        with:
          X-Restli-Protocol-Version: rest.X-Restli-Protocol-Version
          Linkedin-Version: rest.Linkedin-Version
          q: rest.q
          organization: rest.organization
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: marketing-community-use-cases-organization-access-controls-mcp
    port: 9090
    transport: http
    description: MCP adapter for Community Management — Use Cases > Organization Access Controls. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: linkedin-find-organization-access-control
      description: LinkedIn Find Organization Access Control
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-community-use-cases-organization-access-controls.getfindorganizationaccesscontrol
      with:
        X-Restli-Protocol-Version: tools.X-Restli-Protocol-Version
        Linkedin-Version: tools.Linkedin-Version
        q: tools.q
        organization: tools.organization
      outputParameters:
      - type: object
        mapping: $.
