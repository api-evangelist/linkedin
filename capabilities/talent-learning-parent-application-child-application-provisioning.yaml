naftiko: 1.0.0-alpha2
info:
  label: LinkedIn Parent Application Management API — Child Application Provisioning
  description: 'LinkedIn Parent Application Management API — Child Application Provisioning. 1 operations. Lead operation:
    LinkedIn Provision Child Application. Self-contained Naftiko capability covering one Linkedin business surface.'
  tags:
  - Linkedin
  - Child Application Provisioning
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    LINKEDIN_API_KEY: LINKEDIN_API_KEY
capability:
  consumes:
  - type: http
    namespace: talent-learning-parent-application-child-application-provisioning
    baseUri: https://api.linkedin.com
    description: LinkedIn Parent Application Management API — Child Application Provisioning business capability. Self-contained,
      no shared references.
    resources:
    - name: v2-provisionedApplications
      path: /v2/provisionedApplications
      operations:
      - name: provisionchildapplication
        method: POST
        description: LinkedIn Provision Child Application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.LINKEDIN_API_KEY}}'
  exposes:
  - type: rest
    namespace: talent-learning-parent-application-child-application-provisioning-rest
    port: 8080
    description: REST adapter for LinkedIn Parent Application Management API — Child Application Provisioning. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/v2/provisionedapplications
      name: v2-provisionedapplications
      description: REST surface for v2-provisionedApplications.
      operations:
      - method: POST
        name: provisionchildapplication
        description: LinkedIn Provision Child Application
        call: talent-learning-parent-application-child-application-provisioning.provisionchildapplication
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: talent-learning-parent-application-child-application-provisioning-mcp
    port: 9090
    transport: http
    description: MCP adapter for LinkedIn Parent Application Management API — Child Application Provisioning. One tool per
      consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: linkedin-provision-child-application
      description: LinkedIn Provision Child Application
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: talent-learning-parent-application-child-application-provisioning.provisionchildapplication
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
