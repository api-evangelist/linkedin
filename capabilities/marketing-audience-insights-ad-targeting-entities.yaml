naftiko: 1.0.0-alpha2
info:
  label: LinkedIn Marketing Audience Insights API — Ad Targeting Entities
  description: 'LinkedIn Marketing Audience Insights API — Ad Targeting Entities. 2 operations. Lead operation: LinkedIn Get
    Ad Targeting Entities Using Typeahead Search. Self-contained Naftiko capability covering one Linkedin business surface.'
  tags:
  - Linkedin
  - Ad Targeting Entities
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    LINKEDIN_API_KEY: LINKEDIN_API_KEY
capability:
