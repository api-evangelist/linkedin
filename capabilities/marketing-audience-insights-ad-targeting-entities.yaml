  - type: http
    namespace: marketing-audience-insights-ad-targeting-entities
    baseUri: https://api.linkedin.com/rest
    description: LinkedIn Marketing Audience Insights API — Ad Targeting Entities business capability. Self-contained, no
      shared references.
    resources:
    - name: adTargetingEntities
      path: /adTargetingEntities
      operations:
      - name: searchadtargetingentities
        method: GET
        description: LinkedIn Get Ad Targeting Entities Using Typeahead Search
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: LinkedIn-Version
          in: header
          type: string
          description: LinkedIn API version
          required: true
        - name: X-Restli-Protocol-Version
          in: header
          type: string
          description: RestLi protocol version
          required: true
        - name: q
          in: query
          type: string
          description: Query type
          required: true
        - name: query
          in: query
          type: string
          description: Search query string (URL encoded)
          required: true
        - name: facet
          in: query
          type: string
          description: Facet URN to search within (URL encoded)
          required: true
        - name: queryVersion
          in: query
          type: string
          description: Query version format
        - name: start
          in: query
          type: integer
          description: Starting index for pagination
        - name: count
          in: query
          type: integer
          description: Number of results to return
    - name: adTargetingFacets
      path: /adTargetingFacets
      operations:
      - name: getadtargetingfacets
        method: GET
        description: LinkedIn Get List of Available Ad Targeting Facets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: LinkedIn-Version
          in: header
          type: string
          description: LinkedIn API version
          required: true
        - name: X-Restli-Protocol-Version
          in: header
          type: string
          description: RestLi protocol version
          required: true
    authentication:
      type: bearer
      token: '{{env.LINKEDIN_API_KEY}}'
  exposes:
  - type: rest
    namespace: marketing-audience-insights-ad-targeting-entities-rest
    port: 8080
    description: REST adapter for LinkedIn Marketing Audience Insights API — Ad Targeting Entities. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/adtargetingentities
      name: adtargetingentities
      description: REST surface for adTargetingEntities.
      operations:
      - method: GET
        name: searchadtargetingentities
        description: LinkedIn Get Ad Targeting Entities Using Typeahead Search
        call: marketing-audience-insights-ad-targeting-entities.searchadtargetingentities
        with:
          LinkedIn-Version: rest.LinkedIn-Version
          X-Restli-Protocol-Version: rest.X-Restli-Protocol-Version
          q: rest.q
          query: rest.query
          facet: rest.facet
          queryVersion: rest.queryVersion
          start: rest.start
          count: rest.count
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/adtargetingfacets
      name: adtargetingfacets
      description: REST surface for adTargetingFacets.
      operations:
      - method: GET
        name: getadtargetingfacets
        description: LinkedIn Get List of Available Ad Targeting Facets
        call: marketing-audience-insights-ad-targeting-entities.getadtargetingfacets
        with:
          LinkedIn-Version: rest.LinkedIn-Version
          X-Restli-Protocol-Version: rest.X-Restli-Protocol-Version
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: marketing-audience-insights-ad-targeting-entities-mcp
    port: 9090
    transport: http
    description: MCP adapter for LinkedIn Marketing Audience Insights API — Ad Targeting Entities. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: linkedin-get-ad-targeting-entities
      description: LinkedIn Get Ad Targeting Entities Using Typeahead Search
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-audience-insights-ad-targeting-entities.searchadtargetingentities
      with:
        LinkedIn-Version: tools.LinkedIn-Version
        X-Restli-Protocol-Version: tools.X-Restli-Protocol-Version
        q: tools.q
        query: tools.query
        facet: tools.facet
        queryVersion: tools.queryVersion
        start: tools.start
        count: tools.count
      outputParameters:
      - type: object
        mapping: $.
    - name: linkedin-get-list-available-ad
      description: LinkedIn Get List of Available Ad Targeting Facets
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-audience-insights-ad-targeting-entities.getadtargetingfacets
      with:
        LinkedIn-Version: tools.LinkedIn-Version
        X-Restli-Protocol-Version: tools.X-Restli-Protocol-Version
      outputParameters:
      - type: object
        mapping: $.
