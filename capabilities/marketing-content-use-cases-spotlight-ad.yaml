      this capability's consumes block.
    tools:
    - name: linkedin-create-dynamic-spotlight-ad
      description: LinkedIn Create a Dynamic Spotlight Ad
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: marketing-content-use-cases-spotlight-ad.postcreateadynamicspotlight
      with:
        LinkedIn-Version: tools.LinkedIn-Version
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
