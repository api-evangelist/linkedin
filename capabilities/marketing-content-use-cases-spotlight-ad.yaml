    baseUri: https://api.linkedin.com
    description: Content APIs — Use Cases > Spotlight Ad business capability. Self-contained, no shared references.
    resources:
    - name: creatives
      path: /creatives
      operations:
      - name: postcreateadynamicspotlight
        method: POST
        description: LinkedIn Create a Dynamic Spotlight Ad
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: LinkedIn-Version
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: creatives-sponsoredCreative-urn
      path: /creatives/{sponsoredCreative-urn}
      operations:
      - name: getgetadynamicspotlight
        method: GET
        description: LinkedIn Get a Dynamic Spotlight Ad
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: LinkedIn-Version
          in: header
          type: string
        - name: sponsoredCreative-urn
          in: path
          type: string
          required: true
      - name: postupdateadynamicspotlight
        method: POST
        description: LinkedIn Update a Dynamic Spotlight Ad
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: LinkedIn-Version
          in: header
          type: string
        - name: sponsoredCreative-urn
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
