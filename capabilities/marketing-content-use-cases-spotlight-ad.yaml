        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: LinkedIn-Version
          in: header
          type: string
        - name: sponsoredCreative-urn
          in: path
          type: string
          required: true
  exposes:
  - type: rest
    namespace: marketing-content-use-cases-spotlight-ad-rest
    port: 8080
    description: REST adapter for Content APIs — Use Cases > Spotlight Ad. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/creatives
      name: creatives
      description: REST surface for creatives.
      operations:
      - method: POST
        name: postcreateadynamicspotlight
        description: LinkedIn Create a Dynamic Spotlight Ad
        call: marketing-content-use-cases-spotlight-ad.postcreateadynamicspotlight
        with:
          LinkedIn-Version: rest.LinkedIn-Version
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/creatives/{sponsoredcreative-urn}
      name: creatives-sponsoredcreative-urn
      description: REST surface for creatives-sponsoredCreative-urn.
      operations:
      - method: GET
        name: getgetadynamicspotlight
        description: LinkedIn Get a Dynamic Spotlight Ad
        call: marketing-content-use-cases-spotlight-ad.getgetadynamicspotlight
