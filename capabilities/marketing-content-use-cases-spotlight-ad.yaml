naftiko: 1.0.0-alpha2
info:
  label: Content APIs — Use Cases > Spotlight Ad
  description: 'Content APIs — Use Cases > Spotlight Ad. 4 operations. Lead operation: LinkedIn Create a Dynamic Spotlight
    Ad. Self-contained Naftiko capability covering one Linkedin business surface.'
  tags:
  - Linkedin
  - Use Cases > Spotlight Ad
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
