    - name: linkedin-delete-dynamic-spotlight-ad
      description: LinkedIn Delete a Dynamic Spotlight Ad
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: marketing-content-use-cases-spotlight-ad.deletedeleteadynamicspotlight
