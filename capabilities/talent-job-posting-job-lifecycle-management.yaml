naftiko: 1.0.0-alpha2
info:
  label: LinkedIn Job Posting API — Job Lifecycle Management
  description: 'LinkedIn Job Posting API — Job Lifecycle Management. 1 operations. Lead operation: LinkedIn Check Job Posting
    Task Status. Self-contained Naftiko capability covering one Linkedin business surface.'
  tags:
  - Linkedin
  - Job Lifecycle Management
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    LINKEDIN_API_KEY: LINKEDIN_API_KEY
capability:
  consumes:
  - type: http
    namespace: talent-job-posting-job-lifecycle-management
    baseUri: https://api.linkedin.com
    description: LinkedIn Job Posting API — Job Lifecycle Management business capability. Self-contained, no shared references.
    resources:
    - name: v2-simpleJobPostingTasks
      path: /v2/simpleJobPostingTasks
      operations:
      - name: getjobpostingtaskstatus
        method: GET
        description: LinkedIn Check Job Posting Task Status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.LINKEDIN_API_KEY}}'
  exposes:
  - type: rest
    namespace: talent-job-posting-job-lifecycle-management-rest
    port: 8080
    description: REST adapter for LinkedIn Job Posting API — Job Lifecycle Management. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/v2/simplejobpostingtasks
      name: v2-simplejobpostingtasks
      description: REST surface for v2-simpleJobPostingTasks.
      operations:
      - method: GET
        name: getjobpostingtaskstatus
        description: LinkedIn Check Job Posting Task Status
        call: talent-job-posting-job-lifecycle-management.getjobpostingtaskstatus
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: talent-job-posting-job-lifecycle-management-mcp
    port: 9090
    transport: http
    description: MCP adapter for LinkedIn Job Posting API — Job Lifecycle Management. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: linkedin-check-job-posting-task
      description: LinkedIn Check Job Posting Task Status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: talent-job-posting-job-lifecycle-management.getjobpostingtaskstatus
      outputParameters:
      - type: object
        mapping: $.
