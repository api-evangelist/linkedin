naftiko: "1.0.0-alpha1"

info:
  label: "LinkedIn Pages Data Portability"
  description: "LinkedIn Pages Data Portability API for DMA compliance, providing access to organizations, ACLs, analytics, posts, reactions, comments, leads, and events."
  tags:
    - LinkedIn
    - Data Portability
    - Compliance
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      LINKEDIN_OAUTH_TOKEN: LINKEDIN_OAUTH_TOKEN

capability:
  consumes:
    - type: http
      namespace: data-portability
      baseUri: https://api.linkedin.com
      description: "LinkedIn Pages Data Portability API."
      authentication:
        type: bearer
        token: "{{LINKEDIN_OAUTH_TOKEN}}"
      resources:
        - name: dma-organizations
          path: /rest/dmaOrganizations
          description: "DMA organization data."
          operations:
            - name: batch-get-organizations
              method: GET
              description: "Batch get organizations for data portability."
              inputParameters:
                - name: ids
                  in: query
                  type: string
                  required: true
                  description: "Organization IDs"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: dma-organization-by-id
          path: /rest/dmaOrganizations/{organizationId}
          description: "Individual organization data."
          operations:
            - name: get-organization
              method: GET
              description: "Get organization by ID."
              inputParameters:
                - name: organizationId
                  in: path
                  type: string
                  required: true
                  description: "Organization ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: dma-organization-acls
          path: /rest/dmaOrganizationAcls
          description: "Organization access controls."
          operations:
            - name: get-organization-acls
              method: GET
              description: "Get organization ACLs."
              inputParameters:
                - name: q
                  in: query
                  type: string
                  required: true
                  description: "Query type"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: dma-page-analytics
          path: /rest/dmaOrganizationalPageContentAnalytics
          description: "Page content analytics."
          operations:
            - name: get-page-content-analytics
              method: GET
              description: "Get page content analytics."
              inputParameters:
                - name: q
                  in: query
                  type: string
                  required: true
                  description: "Query type"
                - name: organizationUrn
                  in: query
                  type: string
                  required: true
                  description: "Organization URN"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: dma-posts
          path: /rest/dmaPosts
          description: "DMA posts."
          operations:
            - name: get-posts
              method: GET
              description: "Get posts for data portability."
              inputParameters:
                - name: q
                  in: query
                  type: string
                  required: true
                  description: "Query type"
                - name: author
                  in: query
                  type: string
                  required: true
                  description: "Author URN"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: dma-reactions
          path: /rest/dmaReactions
          description: "DMA reactions."
          operations:
            - name: get-reactions
              method: GET
              description: "Get reactions for data portability."
              inputParameters:
                - name: q
                  in: query
                  type: string
                  required: true
                  description: "Query type"
                - name: activityUrn
                  in: query
                  type: string
                  required: true
                  description: "Activity URN"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: dma-comments
          path: /rest/dmaComments
          description: "DMA comments."
          operations:
            - name: get-comments
              method: GET
              description: "Get comments for data portability."
              inputParameters:
                - name: q
                  in: query
                  type: string
                  required: true
                  description: "Query type"
                - name: activityUrn
                  in: query
                  type: string
                  required: true
                  description: "Activity URN"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: dma-lead-gen-responses
          path: /rest/dmaLeadGenResponses
          description: "DMA lead generation responses."
          operations:
            - name: get-lead-gen-responses
              method: GET
              description: "Get lead gen responses for data portability."
              inputParameters:
                - name: q
                  in: query
                  type: string
                  required: true
                  description: "Query type"
                - name: owner
                  in: query
                  type: string
                  required: true
                  description: "Owner URN"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: dma-events
          path: /rest/dmaEvents
          description: "DMA events."
          operations:
            - name: get-events
              method: GET
              description: "Get events for data portability."
              inputParameters:
                - name: q
                  in: query
                  type: string
                  required: true
                  description: "Query type"
                - name: organizer
                  in: query
                  type: string
                  required: true
                  description: "Organizer URN"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: dma-business-manager
          path: /rest/dmaBusinessManagerAccountRelationships
          description: "Business manager relationships."
          operations:
            - name: get-business-manager-relationships
              method: GET
              description: "Get business manager account relationships."
              inputParameters:
                - name: q
                  in: query
                  type: string
                  required: true
                  description: "Query type"
                - name: businessManagerAccount
                  in: query
                  type: string
                  required: true
                  description: "Business manager account URN"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8111
      namespace: data-portability-api
      resources:
        - path: /v1/dma-organizations
          name: dma-organizations
          operations:
            - method: GET
              name: batch-get-organizations
              call: "data-portability.batch-get-organizations"
        - path: /v1/dma-organizations/{organizationId}
          name: dma-organization-by-id
          operations:
            - method: GET
              name: get-organization
              call: "data-portability.get-organization"
        - path: /v1/dma-posts
          name: dma-posts
          operations:
            - method: GET
              name: get-posts
              call: "data-portability.get-posts"
        - path: /v1/dma-events
          name: dma-events
          operations:
            - method: GET
              name: get-events
              call: "data-portability.get-events"

    - type: mcp
      port: 9111
      namespace: data-portability-mcp
      transport: http
      tools:
        - name: batch-get-organizations
          description: "Batch get organizations for data portability."
          hints: { readOnly: true, destructive: false, idempotent: true }
          call: "data-portability.batch-get-organizations"
        - name: get-organization
          description: "Get organization by ID."
          hints: { readOnly: true, destructive: false, idempotent: true }
          call: "data-portability.get-organization"
        - name: get-organization-acls
          description: "Get organization ACLs."
          hints: { readOnly: true, destructive: false, idempotent: true }
          call: "data-portability.get-organization-acls"
        - name: get-page-content-analytics
          description: "Get page content analytics."
          hints: { readOnly: true, destructive: false, idempotent: true }
          call: "data-portability.get-page-content-analytics"
        - name: get-posts
          description: "Get posts for data portability."
          hints: { readOnly: true, destructive: false, idempotent: true }
          call: "data-portability.get-posts"
        - name: get-reactions
          description: "Get reactions for data portability."
          hints: { readOnly: true, destructive: false, idempotent: true }
          call: "data-portability.get-reactions"
        - name: get-comments
          description: "Get comments for data portability."
          hints: { readOnly: true, destructive: false, idempotent: true }
          call: "data-portability.get-comments"
        - name: get-lead-gen-responses
          description: "Get lead gen responses for data portability."
          hints: { readOnly: true, destructive: false, idempotent: true }
          call: "data-portability.get-lead-gen-responses"
        - name: get-events
          description: "Get events for data portability."
          hints: { readOnly: true, destructive: false, idempotent: true }
          call: "data-portability.get-events"
        - name: get-business-manager-relationships
          description: "Get business manager account relationships."
          hints: { readOnly: true, destructive: false, idempotent: true }
          call: "data-portability.get-business-manager-relationships"
