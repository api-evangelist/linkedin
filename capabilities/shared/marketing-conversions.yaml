naftiko: "1.0.0-alpha1"

info:
  label: "LinkedIn Conversions API"
  description: "LinkedIn Conversion API for tracking conversions, managing conversion rules, and streaming conversion events."
  tags:
    - LinkedIn
    - Marketing
    - Conversions
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      LINKEDIN_OAUTH_TOKEN: LINKEDIN_OAUTH_TOKEN

capability:
  consumes:
    - type: http
      namespace: marketing-conversions
      baseUri: https://api.linkedin.com
      description: "LinkedIn Conversions API."
      authentication:
        type: bearer
        token: "{{LINKEDIN_OAUTH_TOKEN}}"
      resources:
        - name: ad-account-users
          path: /adAccountUsers
          description: "Retrieve ad account users."
          operations:
            - name: get-ad-account-users
              method: GET
              description: "Retrieve authenticated user's sponsored ad accounts."
              inputParameters:
                - name: q
                  in: query
                  type: string
                  required: false
                  description: "Query type"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: conversions
          path: /conversions
          description: "Conversion rule management."
          operations:
            - name: get-conversion-rules
              method: GET
              description: "Fetch existing conversion rules for an ad account."
              inputParameters:
                - name: q
                  in: query
                  type: string
                  required: false
                  description: "Query type"
                - name: account
                  in: query
                  type: string
                  required: false
                  description: "Sponsored account URN"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-conversion-rule
              method: POST
              description: "Create a new conversion rule."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: conversion-events
          path: /conversionEvents
          description: "Conversion event streaming."
          operations:
            - name: stream-conversion-events
              method: POST
              description: "Stream multiple conversion events."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8107
      namespace: marketing-conversions-api
      resources:
        - path: /v1/conversions
          name: conversions
          operations:
            - method: GET
              name: get-conversion-rules
              call: "marketing-conversions.get-conversion-rules"
            - method: POST
              name: create-conversion-rule
              call: "marketing-conversions.create-conversion-rule"
        - path: /v1/conversion-events
          name: conversion-events
          operations:
            - method: POST
              name: stream-conversion-events
              call: "marketing-conversions.stream-conversion-events"

    - type: mcp
      port: 9107
      namespace: marketing-conversions-mcp
      transport: http
      tools:
        - name: get-conversion-rules
          description: "Fetch existing conversion rules."
          hints: { readOnly: true, destructive: false, idempotent: true }
          call: "marketing-conversions.get-conversion-rules"
        - name: create-conversion-rule
          description: "Create a new conversion rule."
          hints: { readOnly: false, destructive: false, idempotent: false }
          call: "marketing-conversions.create-conversion-rule"
        - name: stream-conversion-events
          description: "Stream multiple conversion events."
          hints: { readOnly: false, destructive: false, idempotent: false }
          call: "marketing-conversions.stream-conversion-events"
