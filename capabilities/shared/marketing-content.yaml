naftiko: "1.0.0-alpha1"

info:
  label: "LinkedIn Content APIs"
  description: "LinkedIn Content APIs for creating and managing rich content including InMail, images, videos, documents, posts, conversation ads, creatives, and spotlight ads."
  tags:
    - LinkedIn
    - Marketing
    - Content
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      LINKEDIN_OAUTH_TOKEN: LINKEDIN_OAUTH_TOKEN

capability:
  consumes:
    - type: http
      namespace: marketing-content
      baseUri: https://api.linkedin.com
      description: "LinkedIn Content APIs for rich content management."
      authentication:
        type: bearer
        token: "{{LINKEDIN_OAUTH_TOKEN}}"
      resources:
        - name: inmail-contents
          path: /rest/inMailContents
          description: "InMail content management."
          operations:
            - name: create-inmail-content
              method: POST
              description: "Create InMail content."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: batch-get-inmail-content
              method: GET
              description: "Batch retrieve InMail content."
              inputParameters:
                - name: ids
                  in: query
                  type: string
                  required: false
                  description: "InMail content IDs"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: send-test-inmail
              method: POST
              description: "Send a test InMail."
              inputParameters:
                - name: action
                  in: query
                  type: string
                  required: false
                  description: "Action type"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: inmail-content-by-id
          path: /rest/inMailContents/{adInMailContentId}
          description: "Individual InMail content operations."
          operations:
            - name: get-inmail-content
              method: GET
              description: "Retrieve InMail content by ID."
              inputParameters:
                - name: adInMailContentId
                  in: path
                  type: string
                  required: true
                  description: "InMail content ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-inmail-content
              method: POST
              description: "Update InMail content."
              inputParameters:
                - name: adInMailContentId
                  in: path
                  type: string
                  required: true
                  description: "InMail content ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: images
          path: /images
          description: "Image upload management."
          operations:
            - name: initialize-image-upload
              method: POST
              description: "Initialize image upload."
              inputParameters:
                - name: action
                  in: query
                  type: string
                  required: false
                  description: "Action type"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: videos
          path: /videos
          description: "Video upload management."
          operations:
            - name: initialize-video-upload
              method: POST
              description: "Initialize video upload."
              inputParameters:
                - name: action
                  in: query
                  type: string
                  required: false
                  description: "Action type"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: posts
          path: /posts
          description: "Post management."
          operations:
            - name: create-post
              method: POST
              description: "Create document or content post."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-posts
              method: GET
              description: "Fetch multiple posts."
              inputParameters:
                - name: ids
                  in: query
                  type: string
                  required: false
                  description: "Post IDs"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: creatives
          path: /creatives
          description: "Creative management."
          operations:
            - name: create-creative
              method: POST
              description: "Create a dynamic spotlight or other ad creative."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: search-creatives
              method: GET
              description: "Search for creatives."
              inputParameters:
                - name: q
                  in: query
                  type: string
                  required: false
                  description: "Query type"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: conversation-ads
          path: /conversationAds
          description: "Conversation ad management."
          operations:
            - name: create-sponsored-conversation
              method: POST
              description: "Create a sponsored conversation."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-sponsored-conversations
              method: GET
              description: "Get multiple sponsored conversations."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: documents
          path: /documents
          description: "Document upload management."
          operations:
            - name: initialize-document-upload
              method: POST
              description: "Initialize document upload."
              inputParameters:
                - name: action
                  in: query
                  type: string
                  required: false
                  description: "Action type"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8106
      namespace: marketing-content-api
      resources:
        - path: /v1/inmail-contents
          name: inmail-contents
          operations:
            - method: POST
              name: create-inmail-content
              call: "marketing-content.create-inmail-content"
            - method: GET
              name: batch-get-inmail-content
              call: "marketing-content.batch-get-inmail-content"
        - path: /v1/images
          name: images
          operations:
            - method: POST
              name: initialize-image-upload
              call: "marketing-content.initialize-image-upload"
        - path: /v1/videos
          name: videos
          operations:
            - method: POST
              name: initialize-video-upload
              call: "marketing-content.initialize-video-upload"
        - path: /v1/posts
          name: posts
          operations:
            - method: POST
              name: create-post
              call: "marketing-content.create-post"
            - method: GET
              name: get-posts
              call: "marketing-content.get-posts"
        - path: /v1/creatives
          name: creatives
          operations:
            - method: POST
              name: create-creative
              call: "marketing-content.create-creative"
            - method: GET
              name: search-creatives
              call: "marketing-content.search-creatives"
        - path: /v1/conversation-ads
          name: conversation-ads
          operations:
            - method: POST
              name: create-sponsored-conversation
              call: "marketing-content.create-sponsored-conversation"
            - method: GET
              name: get-sponsored-conversations
              call: "marketing-content.get-sponsored-conversations"

    - type: mcp
      port: 9106
      namespace: marketing-content-mcp
      transport: http
      tools:
        - name: create-inmail-content
          description: "Create InMail content."
          hints: { readOnly: false, destructive: false, idempotent: false }
          call: "marketing-content.create-inmail-content"
        - name: get-inmail-content
          description: "Retrieve InMail content by ID."
          hints: { readOnly: true, destructive: false, idempotent: true }
          call: "marketing-content.get-inmail-content"
        - name: update-inmail-content
          description: "Update InMail content."
          hints: { readOnly: false, destructive: false, idempotent: true }
          call: "marketing-content.update-inmail-content"
        - name: initialize-image-upload
          description: "Initialize image upload."
          hints: { readOnly: false, destructive: false, idempotent: false }
          call: "marketing-content.initialize-image-upload"
        - name: initialize-video-upload
          description: "Initialize video upload."
          hints: { readOnly: false, destructive: false, idempotent: false }
          call: "marketing-content.initialize-video-upload"
        - name: create-post
          description: "Create a post."
          hints: { readOnly: false, destructive: false, idempotent: false }
          call: "marketing-content.create-post"
        - name: get-posts
          description: "Fetch multiple posts."
          hints: { readOnly: true, destructive: false, idempotent: true }
          call: "marketing-content.get-posts"
        - name: create-creative
          description: "Create an ad creative."
          hints: { readOnly: false, destructive: false, idempotent: false }
          call: "marketing-content.create-creative"
        - name: search-creatives
          description: "Search for creatives."
          hints: { readOnly: true, destructive: false, idempotent: true }
          call: "marketing-content.search-creatives"
        - name: create-sponsored-conversation
          description: "Create a sponsored conversation."
          hints: { readOnly: false, destructive: false, idempotent: false }
          call: "marketing-content.create-sponsored-conversation"
        - name: get-sponsored-conversations
          description: "Get multiple sponsored conversations."
          hints: { readOnly: true, destructive: false, idempotent: true }
          call: "marketing-content.get-sponsored-conversations"
        - name: initialize-document-upload
          description: "Initialize document upload."
          hints: { readOnly: false, destructive: false, idempotent: false }
          call: "marketing-content.initialize-document-upload"
