naftiko: "1.0.0-alpha1"

info:
  label: "LinkedIn Marketing Audience Insights"
  description: "LinkedIn Audience Insights API for discovering audience segments, targeting facets, and demographic insights."
  tags:
    - LinkedIn
    - Marketing
    - Audience Insights
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      LINKEDIN_OAUTH_TOKEN: LINKEDIN_OAUTH_TOKEN

capability:
  consumes:
    - type: http
      namespace: marketing-audience-insights
      baseUri: https://api.linkedin.com/rest
      description: "LinkedIn Marketing Audience Insights API."
      authentication:
        type: bearer
        token: "{{LINKEDIN_OAUTH_TOKEN}}"
      resources:
        - name: ad-targeting-facets
          path: /adTargetingFacets
          description: "Ad targeting facets for audience segmentation."
          operations:
            - name: get-ad-targeting-facets
              method: GET
              description: "Retrieve available ad targeting facets."
              inputParameters:
                - name: LinkedIn-Version
                  in: header
                  type: string
                  required: true
                  description: "LinkedIn API version"
                - name: X-Restli-Protocol-Version
                  in: header
                  type: string
                  required: true
                  description: "RestLi protocol version"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: ad-targeting-entities
          path: /adTargetingEntities
          description: "Ad targeting entities for specific facets."
          operations:
            - name: search-ad-targeting-entities
              method: GET
              description: "Search for ad targeting entities using typeahead."
              inputParameters:
                - name: LinkedIn-Version
                  in: header
                  type: string
                  required: true
                  description: "LinkedIn API version"
                - name: X-Restli-Protocol-Version
                  in: header
                  type: string
                  required: true
                  description: "RestLi protocol version"
                - name: q
                  in: query
                  type: string
                  required: true
                  description: "Query type"
                - name: query
                  in: query
                  type: string
                  required: true
                  description: "Search query string"
                - name: facet
                  in: query
                  type: string
                  required: true
                  description: "Facet URN to search within"
                - name: start
                  in: query
                  type: integer
                  required: false
                  description: "Starting index"
                - name: count
                  in: query
                  type: integer
                  required: false
                  description: "Number of results"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: targeting-audience-insights
          path: /targetingAudienceInsights
          description: "Audience insights based on targeting criteria."
          operations:
            - name: get-audience-insights
              method: POST
              description: "Fetch audience insights by targeting criteria."
              inputParameters:
                - name: LinkedIn-Version
                  in: header
                  type: string
                  required: true
                  description: "LinkedIn API version"
                - name: X-Restli-Protocol-Version
                  in: header
                  type: string
                  required: true
                  description: "RestLi protocol version"
                - name: action
                  in: query
                  type: string
                  required: true
                  description: "Action to perform"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8102
      namespace: marketing-audience-insights-api
      resources:
        - path: /v1/ad-targeting-facets
          name: ad-targeting-facets
          operations:
            - method: GET
              name: get-ad-targeting-facets
              call: "marketing-audience-insights.get-ad-targeting-facets"
        - path: /v1/ad-targeting-entities
          name: ad-targeting-entities
          operations:
            - method: GET
              name: search-ad-targeting-entities
              call: "marketing-audience-insights.search-ad-targeting-entities"
        - path: /v1/audience-insights
          name: audience-insights
          operations:
            - method: POST
              name: get-audience-insights
              call: "marketing-audience-insights.get-audience-insights"

    - type: mcp
      port: 9102
      namespace: marketing-audience-insights-mcp
      transport: http
      tools:
        - name: get-ad-targeting-facets
          description: "Retrieve available ad targeting facets."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "marketing-audience-insights.get-ad-targeting-facets"
        - name: search-ad-targeting-entities
          description: "Search for ad targeting entities using typeahead."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "marketing-audience-insights.search-ad-targeting-entities"
        - name: get-audience-insights
          description: "Fetch audience insights by targeting criteria."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "marketing-audience-insights.get-audience-insights"
