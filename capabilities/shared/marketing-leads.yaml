naftiko: "1.0.0-alpha1"

info:
  label: "LinkedIn Lead Sync"
  description: "LinkedIn Lead Sync API for managing lead generation forms, form responses, and lead notification webhooks."
  tags:
    - LinkedIn
    - Marketing
    - Lead Generation
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      LINKEDIN_OAUTH_TOKEN: LINKEDIN_OAUTH_TOKEN

capability:
  consumes:
    - type: http
      namespace: marketing-leads
      baseUri: https://api.linkedin.com
      description: "LinkedIn Lead Sync API."
      authentication:
        type: bearer
        token: "{{LINKEDIN_OAUTH_TOKEN}}"
      resources:
        - name: organization-acls
          path: /organizationAcls
          description: "Validate user's organization role."
          operations:
            - name: validate-organization-role
              method: GET
              description: "Validate the user's organization role for lead access."
              inputParameters:
                - name: q
                  in: query
                  type: string
                  required: false
                  description: "Query type"
                - name: state
                  in: query
                  type: string
                  required: false
                  description: "State filter"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: lead-forms
          path: /leadForms
          description: "Lead generation form management."
          operations:
            - name: get-lead-forms
              method: GET
              description: "Get forms for a sponsored account."
              inputParameters:
                - name: q
                  in: query
                  type: string
                  required: false
                  description: "Query type"
                - name: owner
                  in: query
                  type: string
                  required: false
                  description: "Owner URN"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: lead-form-responses
          path: /leadFormResponses
          description: "Lead form response management."
          operations:
            - name: get-lead-form-responses
              method: GET
              description: "Schedule periodic form response pulls."
              inputParameters:
                - name: q
                  in: query
                  type: string
                  required: false
                  description: "Query type"
                - name: owner
                  in: query
                  type: string
                  required: false
                  description: "Owner URN"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: lead-form-response-by-id
          path: /leadFormResponses/{lead_id}
          description: "Individual lead form response."
          operations:
            - name: get-lead-by-id
              method: GET
              description: "Fetch full lead data by ID."
              inputParameters:
                - name: lead_id
                  in: path
                  type: string
                  required: true
                  description: "Lead ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: lead-notifications
          path: /leadNotifications
          description: "Lead notification webhook management."
          operations:
            - name: subscribe-lead-notifications
              method: POST
              description: "Subscribe for lead notification webhooks."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: ad-accounts
          path: /adAccounts
          description: "Ad account retrieval for lead sync."
          operations:
            - name: get-sponsored-accounts
              method: GET
              description: "Get the user's sponsored accounts."
              inputParameters:
                - name: q
                  in: query
                  type: string
                  required: false
                  description: "Query type"
                - name: search
                  in: query
                  type: string
                  required: false
                  description: "Search criteria"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8108
      namespace: marketing-leads-api
      resources:
        - path: /v1/lead-forms
          name: lead-forms
          operations:
            - method: GET
              name: get-lead-forms
              call: "marketing-leads.get-lead-forms"
        - path: /v1/lead-form-responses
          name: lead-form-responses
          operations:
            - method: GET
              name: get-lead-form-responses
              call: "marketing-leads.get-lead-form-responses"
        - path: /v1/lead-form-responses/{lead_id}
          name: lead-by-id
          operations:
            - method: GET
              name: get-lead-by-id
              call: "marketing-leads.get-lead-by-id"
        - path: /v1/lead-notifications
          name: lead-notifications
          operations:
            - method: POST
              name: subscribe-lead-notifications
              call: "marketing-leads.subscribe-lead-notifications"

    - type: mcp
      port: 9108
      namespace: marketing-leads-mcp
      transport: http
      tools:
        - name: validate-organization-role
          description: "Validate user's organization role for lead access."
          hints: { readOnly: true, destructive: false, idempotent: true }
          call: "marketing-leads.validate-organization-role"
        - name: get-lead-forms
          description: "Get lead forms for a sponsored account."
          hints: { readOnly: true, destructive: false, idempotent: true }
          call: "marketing-leads.get-lead-forms"
        - name: get-lead-form-responses
          description: "Get lead form responses."
          hints: { readOnly: true, destructive: false, idempotent: true }
          call: "marketing-leads.get-lead-form-responses"
        - name: get-lead-by-id
          description: "Fetch full lead data by ID."
          hints: { readOnly: true, destructive: false, idempotent: true }
          call: "marketing-leads.get-lead-by-id"
        - name: subscribe-lead-notifications
          description: "Subscribe for lead notification webhooks."
          hints: { readOnly: false, destructive: false, idempotent: false }
          call: "marketing-leads.subscribe-lead-notifications"
        - name: get-sponsored-accounts
          description: "Get the user's sponsored accounts."
          hints: { readOnly: true, destructive: false, idempotent: true }
          call: "marketing-leads.get-sponsored-accounts"
