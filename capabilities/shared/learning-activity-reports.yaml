naftiko: "1.0.0-alpha1"

info:
  label: "LinkedIn Learning Activity Reports"
  description: "LinkedIn Learning APIs for accessing learning activity reports including course completions, content viewed, and learner logins."
  tags:
    - LinkedIn
    - Learning
    - Reporting
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      LINKEDIN_OAUTH_TOKEN: LINKEDIN_OAUTH_TOKEN

capability:
  consumes:
    - type: http
      namespace: learning-activity-reports
      baseUri: https://api.linkedin.com
      description: "LinkedIn Learning Activity Reports API."
      authentication:
        type: bearer
        token: "{{LINKEDIN_OAUTH_TOKEN}}"
      resources:
        - name: learning-activity-reports
          path: /v2/learningActivityReports
          description: "Learning activity reports including completions, views, and logins."
          operations:
            - name: get-learning-activity-reports
              method: GET
              description: "Retrieve learning activity reports aggregated by account, group, individual, or content."
              inputParameters:
                - name: q
                  in: query
                  type: string
                  required: true
                  description: "Query type"
                - name: startedAt
                  in: query
                  type: integer
                  required: true
                  description: "Start timestamp in milliseconds since epoch"
                - name: timeOffset.unit
                  in: query
                  type: string
                  required: true
                  description: "Time offset unit (DAY, WEEK, MONTH)"
                - name: timeOffset.duration
                  in: query
                  type: integer
                  required: true
                  description: "Time offset duration"
                - name: aggregationCriteria.primary
                  in: query
                  type: string
                  required: true
                  description: "Primary aggregation criteria (ACCOUNT, GROUP, INDIVIDUAL, CONTENT)"
                - name: count
                  in: query
                  type: integer
                  required: false
                  description: "Number of results to return"
                - name: start
                  in: query
                  type: integer
                  required: false
                  description: "Starting index for pagination"
                - name: contentSource
                  in: query
                  type: string
                  required: false
                  description: "Source of learning content"
                - name: referer
                  in: header
                  type: string
                  required: false
                  description: "Referrer URN for the request"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: learning-activity-reports-api
      resources:
        - path: /v1/learning-activity-reports
          name: learning-activity-reports
          description: "Learning activity reports."
          operations:
            - method: GET
              name: get-learning-activity-reports
              description: "Retrieve learning activity reports."
              call: "learning-activity-reports.get-learning-activity-reports"

    - type: mcp
      port: 9101
      namespace: learning-activity-reports-mcp
      transport: http
      tools:
        - name: get-learning-activity-reports
          description: "Retrieve learning activity reports aggregated by account, group, individual, or content."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "learning-activity-reports.get-learning-activity-reports"
