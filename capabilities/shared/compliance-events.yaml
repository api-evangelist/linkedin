naftiko: "1.0.0-alpha1"

info:
  label: "LinkedIn Compliance Events"
  description: "LinkedIn Compliance API for monitoring, archiving, and management of communications for enterprises in regulated industries."
  tags:
    - LinkedIn
    - Compliance
    - Archiving
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      LINKEDIN_OAUTH_TOKEN: LINKEDIN_OAUTH_TOKEN

capability:
  consumes:
    - type: http
      namespace: compliance-events
      baseUri: https://api.linkedin.com
      description: "LinkedIn Compliance Events API for monitoring and archiving communications."
      authentication:
        type: bearer
        token: "{{LINKEDIN_OAUTH_TOKEN}}"
      resources:
        - name: compliance-authorizations
          path: /v2/memberComplianceAuthorizations
          description: "Manage compliance monitoring authorizations for members."
          operations:
            - name: opt-in-member
              method: POST
              description: "Opt in a member for compliance monitoring."
              inputParameters:
                - name: member
                  in: body
                  type: string
                  required: true
                  description: "URN of the member to regulate"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  member: "{{tools.member}}"
            - name: check-member-status
              method: GET
              description: "Check if a member is currently opted in for compliance monitoring."
              inputParameters:
                - name: q
                  in: query
                  type: string
                  required: true
                  description: "Query type for member lookup"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: compliance-authorization-by-key
          path: /v2/memberComplianceAuthorizations/developerApplication=urn:li:developerApplication:{DeveloperApplicationId}&member=urn:li:person:{PersonId}
          description: "Manage compliance authorization by composite key."
          operations:
            - name: opt-out-member
              method: DELETE
              description: "Opt out a member from compliance monitoring."
              inputParameters:
                - name: DeveloperApplicationId
                  in: path
                  type: string
                  required: true
                  description: "Developer application ID"
                - name: PersonId
                  in: path
                  type: string
                  required: true
                  description: "Person ID of the member"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: compliance-events
          path: /v2/complianceEvents
          description: "Retrieve compliance events for regulated members."
          operations:
            - name: get-compliance-events
              method: GET
              description: "Retrieve compliance events for a regulated member."
              inputParameters:
                - name: q
                  in: query
                  type: string
                  required: true
                  description: "Query type"
                - name: projection
                  in: query
                  type: string
                  required: false
                  description: "Fields to include in the response"
                - name: startTime
                  in: query
                  type: integer
                  required: false
                  description: "Start time in milliseconds since epoch"
                - name: count
                  in: query
                  type: integer
                  required: false
                  description: "Number of events to retrieve"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: compliance-events-api
      resources:
        - path: /v1/compliance-authorizations
          name: compliance-authorizations
          description: "Compliance monitoring authorizations."
          operations:
            - method: POST
              name: opt-in-member
              description: "Opt in a member for compliance monitoring."
              call: "compliance-events.opt-in-member"
            - method: GET
              name: check-member-status
              description: "Check member compliance monitoring status."
              call: "compliance-events.check-member-status"
        - path: /v1/compliance-authorizations/{DeveloperApplicationId}/{PersonId}
          name: compliance-authorization-by-key
          description: "Manage compliance authorization by key."
          operations:
            - method: DELETE
              name: opt-out-member
              description: "Opt out a member from compliance monitoring."
              call: "compliance-events.opt-out-member"
        - path: /v1/compliance-events
          name: compliance-events
          description: "Compliance events for regulated members."
          operations:
            - method: GET
              name: get-compliance-events
              description: "Retrieve compliance events."
              call: "compliance-events.get-compliance-events"

    - type: mcp
      port: 9100
      namespace: compliance-events-mcp
      transport: http
      tools:
        - name: opt-in-member
          description: "Opt in a member for compliance monitoring."
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "compliance-events.opt-in-member"
        - name: check-member-status
          description: "Check member compliance monitoring status."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "compliance-events.check-member-status"
        - name: opt-out-member
          description: "Opt out a member from compliance monitoring."
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "compliance-events.opt-out-member"
        - name: get-compliance-events
          description: "Retrieve compliance events for a regulated member."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "compliance-events.get-compliance-events"
