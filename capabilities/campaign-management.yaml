naftiko: 1.0.0-alpha2
info:
  label: LinkedIn Campaign Management
  description: Unified workflow for marketing managers to plan, build, and manage LinkedIn ad campaigns -- combining campaign
    management, audience targeting, audience insights, and media planning APIs.
  tags:
  - LinkedIn
  - Campaign Management
  - Advertising
  - Media Planning
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    LINKEDIN_OAUTH_TOKEN: LINKEDIN_OAUTH_TOKEN
capability:
  consumes:
  - type: http
    namespace: marketing-campaigns
    baseUri: https://api.linkedin.com/rest
    description: LinkedIn Marketing Campaign Management API.
    authentication:
      type: bearer
      token: '{{LINKEDIN_OAUTH_TOKEN}}'
    resources:
    - name: ad-account-users
      path: /adAccountUsers
      description: Ad account user access management.
      operations:
      - name: get-authenticated-user-ad-accounts
        method: GET
        description: Retrieve all ad accounts the authenticated user has access to.
        inputParameters:
        - name: q
          in: query
          type: string
          required: true
          description: Query type
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: organization-acls
      path: /organizationAcls
      description: Organization access control lists.
      operations:
      - name: get-organization-acls
        method: GET
        description: Retrieve organization roles for the authenticated user.
        inputParameters:
        - name: q
          in: query
          type: string
          required: true
          description: Query type
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: ad-accounts
      path: /adAccounts
      description: Ad account management.
      operations:
      - name: create-ad-account
        method: POST
        description: Create a new ad account.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: search-ad-accounts
        method: GET
        description: Search for ad accounts.
        inputParameters:
        - name: q
          in: query
          type: string
          required: true
          description: Query type
        - name: search
          in: query
          type: string
          required: false
          description: Search criteria
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: ad-account-by-id
      path: /adAccounts/{SponsoredAccountId}
      description: Individual ad account operations.
      operations:
      - name: get-ad-account-by-id
        method: GET
        description: Retrieve an ad account by ID.
        inputParameters:
        - name: SponsoredAccountId
          in: path
          type: string
          required: true
          description: Sponsored account ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-ad-account
        method: POST
        description: Update an ad account.
        inputParameters:
        - name: SponsoredAccountId
          in: path
          type: string
          required: true
          description: Sponsored account ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: campaign-groups
      path: /adAccounts/{AdAccountsId}/adCampaignGroups
      description: Campaign group management.
      operations:
      - name: search-campaign-groups
        method: GET
        description: Search for campaign groups.
        inputParameters:
        - name: AdAccountsId
          in: path
          type: string
          required: true
          description: Ad account ID
        - name: q
          in: query
          type: string
          required: true
          description: Query type
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-campaign-groups
        method: DELETE
        description: Delete multiple campaign groups.
        inputParameters:
        - name: AdAccountsId
          in: path
          type: string
          required: true
          description: Ad account ID
        - name: ids
          in: query
          type: string
          required: true
          description: Campaign group IDs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: campaign-group-by-id
      path: /adAccounts/{AdAccountsId}/adCampaignGroups/{CampaignGroupId}
      description: Individual campaign group operations.
      operations:
      - name: get-campaign-group-by-id
        method: GET
        description: Retrieve a campaign group by ID.
        inputParameters:
        - name: AdAccountsId
          in: path
          type: string
          required: true
          description: Ad account ID
        - name: CampaignGroupId
          in: path
          type: string
          required: true
          description: Campaign group ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-campaign-group
        method: POST
        description: Update a campaign group.
        inputParameters:
        - name: AdAccountsId
          in: path
          type: string
          required: true
          description: Ad account ID
        - name: CampaignGroupId
          in: path
          type: string
          required: true
          description: Campaign group ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-campaign-group
        method: DELETE
        description: Delete a campaign group.
        inputParameters:
        - name: AdAccountsId
          in: path
          type: string
          required: true
          description: Ad account ID
        - name: CampaignGroupId
          in: path
          type: string
          required: true
          description: Campaign group ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: campaigns
      path: /adAccounts/{AdAccountsId}/adCampaigns
      description: Campaign management.
      operations:
      - name: search-campaigns
        method: GET
        description: Search for campaigns.
        inputParameters:
        - name: AdAccountsId
          in: path
          type: string
          required: true
          description: Ad account ID
        - name: q
          in: query
          type: string
          required: true
          description: Query type
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: campaign-by-id
      path: /adAccounts/{AdAccountsId}/adCampaigns/{CampaignId}
      description: Individual campaign operations.
      operations:
      - name: get-campaign-by-id
        method: GET
        description: Retrieve a campaign by ID.
        inputParameters:
        - name: AdAccountsId
          in: path
          type: string
          required: true
          description: Ad account ID
        - name: CampaignId
          in: path
          type: string
          required: true
          description: Campaign ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: archive-campaign
        method: POST
        description: Archive a campaign.
        inputParameters:
        - name: AdAccountsId
          in: path
          type: string
          required: true
          description: Ad account ID
        - name: CampaignId
          in: path
          type: string
          required: true
          description: Campaign ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: creatives
      path: /creatives
      description: Creative management.
      operations:
      - name: create-creative
        method: POST
        description: Create a new ad creative.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: audience-counts
      path: /audienceCounts
      description: Audience count estimation.
      operations:
      - name: get-audience-count
        method: GET
        description: Get audience count by targeting criteria.
        inputParameters:
        - name: q
          in: query
          type: string
          required: true
          description: Query type
        - name: targetingCriteria
          in: query
          type: string
          required: true
          description: URL-encoded targeting criteria
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: marketing-audience
    baseUri: https://api.linkedin.com/rest
    description: LinkedIn Marketing Audiences API.
    authentication:
      type: bearer
      token: '{{LINKEDIN_OAUTH_TOKEN}}'
    resources:
    - name: ad-accounts
      path: /adAccounts
      description: Ad account management.
      operations:
      - name: get-ad-accounts
        method: GET
        description: Retrieve the authenticated user's ad accounts.
        inputParameters:
        - name: X-Restli-Protocol-Version
          in: header
          type: string
          required: true
          description: RestLi protocol version
        - name: LinkedIn-Version
          in: header
          type: string
          required: true
          description: LinkedIn API version
        - name: q
          in: query
          type: string
          required: true
          description: Query type
        - name: search
          in: query
          type: string
          required: false
          description: Search criteria
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: dmp-segments
      path: /dmpSegments
      description: DMP segment management.
      operations:
      - name: get-dmp-segments
        method: GET
        description: Retrieve DMP segments for an ad account.
        inputParameters:
        - name: q
          in: query
          type: string
          required: true
          description: Query type
        - name: account
          in: query
          type: string
          required: true
          description: Sponsored account URN
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-dmp-segment
        method: POST
        description: Create a new DMP segment.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: company-streaming
      path: /dmpSegments/{CompanySegmentId}/companies
      description: Stream company data to DMP segments.
      operations:
      - name: stream-companies
        method: POST
        description: Add or remove companies from a DMP segment.
        inputParameters:
        - name: CompanySegmentId
          in: path
          type: string
          required: true
          description: ID of the company DMP segment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: user-streaming
      path: /dmpSegments/{UserSegmentId}/users
      description: Stream user data to DMP segments.
      operations:
      - name: stream-users
        method: POST
        description: Add or remove users from a DMP segment.
        inputParameters:
        - name: UserSegmentId
          in: path
          type: string
          required: true
          description: ID of the user DMP segment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: list-uploads
      path: /dmpSegments/{ListUploadSegmentId}/listUploads
      description: Attach uploaded lists to DMP segments.
      operations:
      - name: attach-list
        method: POST
        description: Attach an uploaded CSV list to a DMP segment.
        inputParameters:
        - name: ListUploadSegmentId
          in: path
          type: string
          required: true
          description: ID of the list upload DMP segment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: marketing-audience-insights
    baseUri: https://api.linkedin.com/rest
    description: LinkedIn Marketing Audience Insights API.
    authentication:
      type: bearer
      token: '{{LINKEDIN_OAUTH_TOKEN}}'
    resources:
    - name: ad-targeting-facets
      path: /adTargetingFacets
      description: Ad targeting facets for audience segmentation.
      operations:
      - name: get-ad-targeting-facets
        method: GET
        description: Retrieve available ad targeting facets.
        inputParameters:
        - name: LinkedIn-Version
          in: header
          type: string
          required: true
          description: LinkedIn API version
        - name: X-Restli-Protocol-Version
          in: header
          type: string
          required: true
          description: RestLi protocol version
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: ad-targeting-entities
      path: /adTargetingEntities
      description: Ad targeting entities for specific facets.
      operations:
      - name: search-ad-targeting-entities
        method: GET
        description: Search for ad targeting entities using typeahead.
        inputParameters:
        - name: LinkedIn-Version
          in: header
          type: string
          required: true
          description: LinkedIn API version
        - name: X-Restli-Protocol-Version
          in: header
          type: string
          required: true
          description: RestLi protocol version
        - name: q
          in: query
          type: string
          required: true
          description: Query type
        - name: query
          in: query
          type: string
          required: true
          description: Search query string
        - name: facet
          in: query
          type: string
          required: true
          description: Facet URN to search within
        - name: start
          in: query
          type: integer
          required: false
          description: Starting index
        - name: count
          in: query
          type: integer
          required: false
          description: Number of results
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: targeting-audience-insights
      path: /targetingAudienceInsights
      description: Audience insights based on targeting criteria.
      operations:
      - name: get-audience-insights
        method: POST
        description: Fetch audience insights by targeting criteria.
        inputParameters:
        - name: LinkedIn-Version
          in: header
          type: string
          required: true
          description: LinkedIn API version
        - name: X-Restli-Protocol-Version
          in: header
          type: string
          required: true
          description: RestLi protocol version
        - name: action
          in: query
          type: string
          required: true
          description: Action to perform
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: marketing-media-planning
    baseUri: https://api.linkedin.com
    description: LinkedIn Media Planning API.
    authentication:
      type: bearer
      token: '{{LINKEDIN_OAUTH_TOKEN}}'
    resources:
    - name: ad-targeting-facets
      path: /adTargetingFacets
      description: Ad targeting facets for media planning.
      operations:
      - name: get-targeting-facets
        method: GET
        description: Get available ad targeting facets.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: ad-targeting-entities
      path: /adTargetingEntities
      description: Ad targeting entities for media planning.
      operations:
      - name: search-targeting-entities
        method: GET
        description: Search targeting entities using typeahead.
        inputParameters:
        - name: q
          in: query
          type: string
          required: false
          description: Query type
        - name: query
          in: query
          type: string
          required: false
          description: Search query
        - name: facet
          in: query
          type: string
          required: false
          description: Facet URN
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: media-planning
      path: /mediaPlanning
      description: Media plan forecasting.
      operations:
      - name: forecast-impressions
        method: POST
        description: Forecast average lifetime frequency and impressions.
        inputParameters:
        - name: action
          in: query
          type: string
          required: false
          description: Action type
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: campaign-management-api
    description: Unified REST API for LinkedIn campaign management workflows.
    resources:
    - path: /v1/ad-accounts
      name: ad-accounts
      description: Ad account management.
      operations:
      - method: GET
        name: search-ad-accounts
        description: Search for ad accounts.
        call: marketing-campaigns.search-ad-accounts
      - method: POST
        name: create-ad-account
        description: Create a new ad account.
        call: marketing-campaigns.create-ad-account
    - path: /v1/ad-accounts/{SponsoredAccountId}
      name: ad-account-by-id
      description: Individual ad account operations.
      operations:
      - method: GET
        name: get-ad-account-by-id
        description: Retrieve an ad account by ID.
        call: marketing-campaigns.get-ad-account-by-id
      - method: POST
        name: update-ad-account
        description: Update an ad account.
        call: marketing-campaigns.update-ad-account
    - path: /v1/campaign-groups
      name: campaign-groups
      description: Campaign group management.
      operations:
      - method: GET
        name: search-campaign-groups
        description: Search for campaign groups.
        call: marketing-campaigns.search-campaign-groups
    - path: /v1/campaigns
      name: campaigns
      description: Campaign management.
      operations:
      - method: GET
        name: search-campaigns
        description: Search for campaigns.
        call: marketing-campaigns.search-campaigns
    - path: /v1/creatives
      name: creatives
      description: Creative management.
      operations:
      - method: POST
        name: create-creative
        description: Create a new ad creative.
        call: marketing-campaigns.create-creative
    - path: /v1/audience-counts
      name: audience-counts
      description: Audience count estimation.
      operations:
      - method: GET
        name: get-audience-count
        description: Get audience count by targeting criteria.
        call: marketing-campaigns.get-audience-count
    - path: /v1/dmp-segments
      name: dmp-segments
      description: DMP segment management.
      operations:
      - method: GET
        name: get-dmp-segments
        description: Retrieve DMP segments.
        call: marketing-audience.get-dmp-segments
      - method: POST
        name: create-dmp-segment
        description: Create a new DMP segment.
        call: marketing-audience.create-dmp-segment
    - path: /v1/ad-targeting-facets
      name: ad-targeting-facets
      description: Ad targeting facets.
      operations:
      - method: GET
        name: get-ad-targeting-facets
        description: Retrieve available ad targeting facets.
        call: marketing-audience-insights.get-ad-targeting-facets
    - path: /v1/audience-insights
      name: audience-insights
      description: Audience insights.
      operations:
      - method: POST
        name: get-audience-insights
        description: Fetch audience insights by targeting criteria.
        call: marketing-audience-insights.get-audience-insights
    - path: /v1/media-plans
      name: media-plans
      description: Media plan forecasting.
      operations:
      - method: POST
        name: forecast-impressions
        description: Forecast reach and impressions.
        call: marketing-media-planning.forecast-impressions
  - type: mcp
    port: 9090
    namespace: campaign-management-mcp
    transport: http
    description: MCP server for AI-assisted LinkedIn campaign management.
    tools:
    - name: search-ad-accounts
      description: Search for ad accounts.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-campaigns.search-ad-accounts
    - name: create-ad-account
      description: Create a new ad account.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: marketing-campaigns.create-ad-account
    - name: get-ad-account-by-id
      description: Retrieve an ad account by ID.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-campaigns.get-ad-account-by-id
    - name: search-campaign-groups
      description: Search for campaign groups.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-campaigns.search-campaign-groups
    - name: search-campaigns
      description: Search for campaigns.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-campaigns.search-campaigns
    - name: get-campaign-by-id
      description: Retrieve a campaign by ID.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-campaigns.get-campaign-by-id
    - name: archive-campaign
      description: Archive a campaign.
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: marketing-campaigns.archive-campaign
    - name: delete-campaign-group
      description: Delete a campaign group.
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: marketing-campaigns.delete-campaign-group
    - name: create-creative
      description: Create a new ad creative.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: marketing-campaigns.create-creative
    - name: get-audience-count
      description: Get audience count by targeting criteria.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-campaigns.get-audience-count
    - name: get-dmp-segments
      description: Retrieve DMP segments.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-audience.get-dmp-segments
    - name: create-dmp-segment
      description: Create a new DMP segment.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: marketing-audience.create-dmp-segment
    - name: stream-companies
      description: Stream company data to a DMP segment.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: marketing-audience.stream-companies
    - name: stream-users
      description: Stream user data to a DMP segment.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: marketing-audience.stream-users
    - name: get-ad-targeting-facets
      description: Retrieve available ad targeting facets.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-audience-insights.get-ad-targeting-facets
    - name: search-ad-targeting-entities
      description: Search for ad targeting entities.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-audience-insights.search-ad-targeting-entities
    - name: get-audience-insights
      description: Fetch audience insights by targeting criteria.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-audience-insights.get-audience-insights
    - name: forecast-impressions
      description: Forecast reach and impressions for media planning.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-media-planning.forecast-impressions
