naftiko: 1.0.0-alpha2
info:
  label: Media Planning — Ad Targeting Entities
  description: 'Media Planning — Ad Targeting Entities. 2 operations. Lead operation: LinkedIn Get Bing Geo Locations Using
    Search Typeahead. Self-contained Naftiko capability covering one Linkedin business surface.'
  tags:
  - Linkedin
  - Ad Targeting Entities
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    LINKEDIN_API_KEY: LINKEDIN_API_KEY
capability:
  consumes:
  - type: http
    namespace: marketing-media-planning-ad-targeting-entities
    baseUri: https://api.linkedin.com
    description: Media Planning — Ad Targeting Entities business capability. Self-contained, no shared references.
    resources:
    - name: adTargetingEntities
      path: /adTargetingEntities
      operations:
      - name: getgetbinggeolocations
        method: GET
        description: LinkedIn Get Bing Geo Locations Using Search Typeahead
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: LinkedIn-Version
          in: header
          type: string
        - name: X-Restli-Protocol-Version
          in: header
          type: string
        - name: q
          in: query
          type: string
        - name: query
          in: query
          type: string
        - name: facet
          in: query
          type: string
        - name: queryVersion
          in: query
          type: string
        - name: start
          in: query
          type: integer
        - name: count
          in: query
          type: integer
    - name: adTargetingFacets
      path: /adTargetingFacets
      operations:
      - name: getgetalistof
        method: GET
        description: LinkedIn Get a List of Available Ad Targeting Facets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: LinkedIn-Version
          in: header
          type: string
        - name: X-Restli-Protocol-Version
          in: header
          type: string
  exposes:
  - type: rest
    namespace: marketing-media-planning-ad-targeting-entities-rest
    port: 8080
    description: REST adapter for Media Planning — Ad Targeting Entities. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/adtargetingentities
      name: adtargetingentities
      description: REST surface for adTargetingEntities.
      operations:
      - method: GET
        name: getgetbinggeolocations
        description: LinkedIn Get Bing Geo Locations Using Search Typeahead
        call: marketing-media-planning-ad-targeting-entities.getgetbinggeolocations
        with:
          LinkedIn-Version: rest.LinkedIn-Version
          X-Restli-Protocol-Version: rest.X-Restli-Protocol-Version
          q: rest.q
          query: rest.query
          facet: rest.facet
          queryVersion: rest.queryVersion
          start: rest.start
          count: rest.count
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/adtargetingfacets
      name: adtargetingfacets
      description: REST surface for adTargetingFacets.
      operations:
      - method: GET
        name: getgetalistof
        description: LinkedIn Get a List of Available Ad Targeting Facets
        call: marketing-media-planning-ad-targeting-entities.getgetalistof
        with:
          LinkedIn-Version: rest.LinkedIn-Version
          X-Restli-Protocol-Version: rest.X-Restli-Protocol-Version
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: marketing-media-planning-ad-targeting-entities-mcp
    port: 9090
    transport: http
    description: MCP adapter for Media Planning — Ad Targeting Entities. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: linkedin-get-bing-geo-locations
      description: LinkedIn Get Bing Geo Locations Using Search Typeahead
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-media-planning-ad-targeting-entities.getgetbinggeolocations
      with:
        LinkedIn-Version: tools.LinkedIn-Version
        X-Restli-Protocol-Version: tools.X-Restli-Protocol-Version
        q: tools.q
        query: tools.query
        facet: tools.facet
        queryVersion: tools.queryVersion
        start: tools.start
        count: tools.count
      outputParameters:
      - type: object
        mapping: $.
    - name: linkedin-get-list-available-ad
      description: LinkedIn Get a List of Available Ad Targeting Facets
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-media-planning-ad-targeting-entities.getgetalistof
      with:
        LinkedIn-Version: tools.LinkedIn-Version
        X-Restli-Protocol-Version: tools.X-Restli-Protocol-Version
      outputParameters:
      - type: object
        mapping: $.
