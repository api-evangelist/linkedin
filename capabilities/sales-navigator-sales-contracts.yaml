naftiko: 1.0.0-alpha2
info:
  label: LinkedIn Sales Navigator API — Sales Contracts
  description: 'LinkedIn Sales Navigator API — Sales Contracts. 1 operations. Lead operation: LinkedIn Find All Contracts
    Where User Has Active Seat. Self-contained Naftiko capability covering one Linkedin business surface.'
  tags:
  - Linkedin
  - Sales Contracts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    LINKEDIN_API_KEY: LINKEDIN_API_KEY
capability:
  consumes:
  - type: http
    namespace: sales-navigator-sales-contracts
    baseUri: https://api.linkedin.com/v2
    description: LinkedIn Sales Navigator API — Sales Contracts business capability. Self-contained, no shared references.
    resources:
    - name: salesContracts
      path: /salesContracts
      operations:
      - name: getcontractsbymember
        method: GET
        description: LinkedIn Find All Contracts Where User Has Active Seat
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: q
          in: query
          type: string
          description: Query parameter to fetch contracts for the member
          required: true
    authentication:
      type: bearer
      token: '{{env.LINKEDIN_API_KEY}}'
  exposes:
  - type: rest
    namespace: sales-navigator-sales-contracts-rest
    port: 8080
    description: REST adapter for LinkedIn Sales Navigator API — Sales Contracts. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/salescontracts
      name: salescontracts
      description: REST surface for salesContracts.
      operations:
      - method: GET
        name: getcontractsbymember
        description: LinkedIn Find All Contracts Where User Has Active Seat
        call: sales-navigator-sales-contracts.getcontractsbymember
        with:
          q: rest.q
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: sales-navigator-sales-contracts-mcp
    port: 9090
    transport: http
    description: MCP adapter for LinkedIn Sales Navigator API — Sales Contracts. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: linkedin-find-all-contracts-where
      description: LinkedIn Find All Contracts Where User Has Active Seat
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: sales-navigator-sales-contracts.getcontractsbymember
      with:
        q: tools.q
      outputParameters:
      - type: object
        mapping: $.
