      path: /organizations
      operations:
      - name: getfindadministeredorganizationbrands
        method: GET
        description: LinkedIn Find Administered Organization Brands by Parent Org
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: LinkedIn-Version
          in: header
          type: string
        - name: q
          in: query
          type: string
        - name: parent
          in: query
          type: string
  exposes:
