  description: 'LinkedIn Ads Transparency API — Advertiser Transparency. 1 operations. Lead operation: LinkedIn Get Advertiser
    Transparency Data. Self-contained Naftiko capability covering one Linkedin business surface.'
  tags:
  - Linkedin
  - Advertiser Transparency
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    LINKEDIN_API_KEY: LINKEDIN_API_KEY
capability:
