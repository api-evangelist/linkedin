    port: 9090
    transport: http
    description: MCP adapter for LinkedIn Ads Transparency API — Advertiser Transparency. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: linkedin-get-advertiser-transparency-data
      description: LinkedIn Get Advertiser Transparency Data
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: regulatory-ads-transparency-advertiser-transparency.getadvertisertransparencydata
      outputParameters:
      - type: object
        mapping: $.
