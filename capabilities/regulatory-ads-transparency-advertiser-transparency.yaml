      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/advertisertransparencydata/urn-li-sponsoredaccount-sponsoredaccount-id
      name: rest-advertisertransparencydata-urn-li-sponsoredaccount-sponsoredaccount-id
      description: REST surface for rest-advertiserTransparencyData-urn:li:sponsoredAccount:{sponsoredaccount_id}.
      operations:
      - method: GET
        name: getadvertisertransparencydata
        description: LinkedIn Get Advertiser Transparency Data
        call: regulatory-ads-transparency-advertiser-transparency.getadvertisertransparencydata
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
