  - type: http
    namespace: regulatory-ads-transparency-advertiser-transparency
    baseUri: https://api.linkedin.com
    description: LinkedIn Ads Transparency API — Advertiser Transparency business capability. Self-contained, no shared references.
    resources:
    - name: rest-advertiserTransparencyData-urn:li:sponsoredAccount:{sponsoredaccount_id}
      path: /rest/advertiserTransparencyData/urn:li:sponsoredAccount:{sponsoredaccount_id}
      operations:
      - name: getadvertisertransparencydata
        method: GET
        description: LinkedIn Get Advertiser Transparency Data
        outputRawFormat: json
