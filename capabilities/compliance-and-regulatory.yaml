naftiko: 1.0.0-alpha2
info:
  label: LinkedIn Compliance And Regulatory
  description: Unified workflow for compliance officers to monitor regulated communications, export data for portability compliance,
    and access ads transparency data -- combining compliance events, data portability, and ads transparency APIs.
  tags:
  - LinkedIn
  - Compliance
  - Regulatory
  - Data Portability
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    LINKEDIN_OAUTH_TOKEN: LINKEDIN_OAUTH_TOKEN
capability:
  consumes:
  - type: http
    namespace: compliance-events
    baseUri: https://api.linkedin.com
    description: LinkedIn Compliance Events API for monitoring and archiving communications.
    authentication:
      type: bearer
      token: '{{LINKEDIN_OAUTH_TOKEN}}'
    resources:
    - name: compliance-authorizations
      path: /v2/memberComplianceAuthorizations
      description: Manage compliance monitoring authorizations for members.
      operations:
      - name: opt-in-member
        method: POST
        description: Opt in a member for compliance monitoring.
        inputParameters:
        - name: member
          in: body
          type: string
          required: true
          description: URN of the member to regulate
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            member: '{{tools.member}}'
      - name: check-member-status
        method: GET
        description: Check if a member is currently opted in for compliance monitoring.
        inputParameters:
        - name: q
          in: query
          type: string
          required: true
          description: Query type for member lookup
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: compliance-authorization-by-key
      path: /v2/memberComplianceAuthorizations/developerApplication=urn:li:developerApplication:{DeveloperApplicationId}&member=urn:li:person:{PersonId}
      description: Manage compliance authorization by composite key.
      operations:
      - name: opt-out-member
        method: DELETE
        description: Opt out a member from compliance monitoring.
        inputParameters:
        - name: DeveloperApplicationId
          in: path
          type: string
          required: true
          description: Developer application ID
        - name: PersonId
          in: path
          type: string
          required: true
          description: Person ID of the member
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: compliance-events
      path: /v2/complianceEvents
      description: Retrieve compliance events for regulated members.
      operations:
      - name: get-compliance-events
        method: GET
        description: Retrieve compliance events for a regulated member.
        inputParameters:
        - name: q
          in: query
          type: string
          required: true
          description: Query type
        - name: projection
          in: query
          type: string
          required: false
          description: Fields to include in the response
        - name: startTime
          in: query
          type: integer
          required: false
          description: Start time in milliseconds since epoch
        - name: count
          in: query
          type: integer
          required: false
          description: Number of events to retrieve
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: data-portability
    baseUri: https://api.linkedin.com
    description: LinkedIn Pages Data Portability API.
    authentication:
      type: bearer
      token: '{{LINKEDIN_OAUTH_TOKEN}}'
    resources:
    - name: dma-organizations
      path: /rest/dmaOrganizations
      description: DMA organization data.
      operations:
      - name: batch-get-organizations
        method: GET
        description: Batch get organizations for data portability.
        inputParameters:
        - name: ids
          in: query
          type: string
          required: true
          description: Organization IDs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: dma-organization-by-id
      path: /rest/dmaOrganizations/{organizationId}
      description: Individual organization data.
      operations:
      - name: get-organization
        method: GET
        description: Get organization by ID.
        inputParameters:
        - name: organizationId
          in: path
          type: string
          required: true
          description: Organization ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: dma-organization-acls
      path: /rest/dmaOrganizationAcls
      description: Organization access controls.
      operations:
      - name: get-organization-acls
        method: GET
        description: Get organization ACLs.
        inputParameters:
        - name: q
          in: query
          type: string
          required: true
          description: Query type
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: dma-page-analytics
      path: /rest/dmaOrganizationalPageContentAnalytics
      description: Page content analytics.
      operations:
      - name: get-page-content-analytics
        method: GET
        description: Get page content analytics.
        inputParameters:
        - name: q
          in: query
          type: string
          required: true
          description: Query type
        - name: organizationUrn
          in: query
          type: string
          required: true
          description: Organization URN
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: dma-posts
      path: /rest/dmaPosts
      description: DMA posts.
      operations:
      - name: get-posts
        method: GET
        description: Get posts for data portability.
        inputParameters:
        - name: q
          in: query
          type: string
          required: true
          description: Query type
        - name: author
          in: query
          type: string
          required: true
          description: Author URN
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: dma-reactions
      path: /rest/dmaReactions
      description: DMA reactions.
      operations:
      - name: get-reactions
        method: GET
        description: Get reactions for data portability.
        inputParameters:
        - name: q
          in: query
          type: string
          required: true
          description: Query type
        - name: activityUrn
          in: query
          type: string
          required: true
          description: Activity URN
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: dma-comments
      path: /rest/dmaComments
      description: DMA comments.
      operations:
      - name: get-comments
        method: GET
        description: Get comments for data portability.
        inputParameters:
        - name: q
          in: query
          type: string
          required: true
          description: Query type
        - name: activityUrn
          in: query
          type: string
          required: true
          description: Activity URN
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: dma-lead-gen-responses
      path: /rest/dmaLeadGenResponses
      description: DMA lead generation responses.
      operations:
      - name: get-lead-gen-responses
        method: GET
        description: Get lead gen responses for data portability.
        inputParameters:
        - name: q
          in: query
          type: string
          required: true
          description: Query type
        - name: owner
          in: query
          type: string
          required: true
          description: Owner URN
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: dma-events
      path: /rest/dmaEvents
      description: DMA events.
      operations:
      - name: get-events
        method: GET
        description: Get events for data portability.
        inputParameters:
        - name: q
          in: query
          type: string
          required: true
          description: Query type
        - name: organizer
          in: query
          type: string
          required: true
          description: Organizer URN
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: dma-business-manager
      path: /rest/dmaBusinessManagerAccountRelationships
      description: Business manager relationships.
      operations:
      - name: get-business-manager-relationships
        method: GET
        description: Get business manager account relationships.
        inputParameters:
        - name: q
          in: query
          type: string
          required: true
          description: Query type
        - name: businessManagerAccount
          in: query
          type: string
          required: true
          description: Business manager account URN
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: ads-transparency
    baseUri: https://api.linkedin.com
    description: LinkedIn Ads Transparency API.
    authentication:
      type: bearer
      token: '{{LINKEDIN_OAUTH_TOKEN}}'
    resources:
    - name: advertiser-transparency
      path: /rest/advertiserTransparencyData/urn:li:sponsoredAccount:{sponsoredaccount_id}
      description: Advertiser transparency data.
      operations:
      - name: get-advertiser-transparency
        method: GET
        description: Get advertiser transparency data for a sponsored account.
        inputParameters:
        - name: sponsoredaccount_id
          in: path
          type: string
          required: true
          description: Sponsored account ID
        - name: month
          in: query
          type: integer
          required: false
          description: Month in YYYYMM format
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8086
    namespace: compliance-regulatory-api
    description: Unified REST API for LinkedIn compliance and regulatory workflows.
    resources:
    - path: /v1/compliance-authorizations
      name: compliance-authorizations
      operations:
      - method: POST
        name: opt-in-member
        description: Opt in a member for compliance monitoring.
        call: compliance-events.opt-in-member
      - method: GET
        name: check-member-status
        description: Check member compliance monitoring status.
        call: compliance-events.check-member-status
    - path: /v1/compliance-events
      name: compliance-events
      operations:
      - method: GET
        name: get-compliance-events
        description: Retrieve compliance events.
        call: compliance-events.get-compliance-events
    - path: /v1/dma-organizations
      name: dma-organizations
      operations:
      - method: GET
        name: batch-get-organizations
        description: Batch get organizations for data portability.
        call: data-portability.batch-get-organizations
    - path: /v1/dma-organizations/{organizationId}
      name: dma-organization-by-id
      operations:
      - method: GET
        name: get-organization
        description: Get organization by ID.
        call: data-portability.get-organization
    - path: /v1/dma-posts
      name: dma-posts
      operations:
      - method: GET
        name: get-dma-posts
        description: Get posts for data portability.
        call: data-portability.get-posts
    - path: /v1/dma-reactions
      name: dma-reactions
      operations:
      - method: GET
        name: get-dma-reactions
        description: Get reactions for data portability.
        call: data-portability.get-reactions
    - path: /v1/dma-comments
      name: dma-comments
      operations:
      - method: GET
        name: get-dma-comments
        description: Get comments for data portability.
        call: data-portability.get-comments
    - path: /v1/dma-events
      name: dma-events
      operations:
      - method: GET
        name: get-dma-events
        description: Get events for data portability.
        call: data-portability.get-events
    - path: /v1/advertiser-transparency/{sponsoredaccount_id}
      name: advertiser-transparency
      operations:
      - method: GET
        name: get-advertiser-transparency
        description: Get advertiser transparency data.
        call: ads-transparency.get-advertiser-transparency
  - type: mcp
    port: 9096
    namespace: compliance-regulatory-mcp
    transport: http
    description: MCP server for AI-assisted LinkedIn compliance and regulatory workflows.
    tools:
    - name: opt-in-member
      description: Opt in a member for compliance monitoring.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: compliance-events.opt-in-member
    - name: check-member-status
      description: Check member compliance monitoring status.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: compliance-events.check-member-status
    - name: opt-out-member
      description: Opt out a member from compliance monitoring.
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: compliance-events.opt-out-member
    - name: get-compliance-events
      description: Retrieve compliance events for a regulated member.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: compliance-events.get-compliance-events
    - name: batch-get-organizations
      description: Batch get organizations for data portability.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: data-portability.batch-get-organizations
    - name: get-organization
      description: Get organization by ID for data portability.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: data-portability.get-organization
    - name: get-organization-acls
      description: Get organization ACLs for data portability.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: data-portability.get-organization-acls
    - name: get-page-content-analytics
      description: Get page content analytics for data portability.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: data-portability.get-page-content-analytics
    - name: get-dma-posts
      description: Get posts for data portability.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: data-portability.get-posts
    - name: get-dma-reactions
      description: Get reactions for data portability.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: data-portability.get-reactions
    - name: get-dma-comments
      description: Get comments for data portability.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: data-portability.get-comments
    - name: get-dma-lead-gen-responses
      description: Get lead gen responses for data portability.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: data-portability.get-lead-gen-responses
    - name: get-dma-events
      description: Get events for data portability.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: data-portability.get-events
    - name: get-business-manager-relationships
      description: Get business manager account relationships.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: data-portability.get-business-manager-relationships
    - name: get-advertiser-transparency
      description: Get advertiser transparency data for a sponsored account.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ads-transparency.get-advertiser-transparency
