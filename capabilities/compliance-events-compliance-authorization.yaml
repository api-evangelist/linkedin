naftiko: 1.0.0-alpha2
info:
  label: LinkedIn Compliance Events API — Compliance Authorization
  description: 'LinkedIn Compliance Events API — Compliance Authorization. 3 operations. Lead operation: LinkedIn Opt in Member
    for Compliance Monitoring. Self-contained Naftiko capability covering one Linkedin business surface.'
  tags:
  - Linkedin
  - Compliance Authorization
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    LINKEDIN_API_KEY: LINKEDIN_API_KEY
capability:
  consumes:
  - type: http
    namespace: compliance-events-compliance-authorization
    baseUri: https://api.linkedin.com
    description: LinkedIn Compliance Events API — Compliance Authorization business capability. Self-contained, no shared
      references.
    resources:
    - name: v2-memberComplianceAuthorizations
      path: /v2/memberComplianceAuthorizations
      operations:
      - name: optinmemberforcompliance
        method: POST
        description: LinkedIn Opt in Member for Compliance Monitoring
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: checkmemberregulationstatus
        method: GET
        description: LinkedIn Check Member Regulation Status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: q
          in: query
          type: string
          description: Query type for member lookup
          required: true
    - name: v2-memberComplianceAuthorizations-developerApplication=urn:li:developerApplicati
      path: /v2/memberComplianceAuthorizations/developerApplication=urn:li:developerApplication:{DeveloperApplicationId}&member=urn:li:person:{PersonId}
      operations:
      - name: optoutmemberfromcompliance
        method: DELETE
        description: LinkedIn Opt Out Member from Compliance Monitoring
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: DeveloperApplicationId
          in: path
          type: string
          description: Developer application ID
          required: true
        - name: PersonId
          in: path
          type: string
          description: Person ID of the member
          required: true
    authentication:
      type: bearer
      token: '{{env.LINKEDIN_API_KEY}}'
  exposes:
  - type: rest
    namespace: compliance-events-compliance-authorization-rest
    port: 8080
    description: REST adapter for LinkedIn Compliance Events API — Compliance Authorization. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/v2/membercomplianceauthorizations
      name: v2-membercomplianceauthorizations
      description: REST surface for v2-memberComplianceAuthorizations.
      operations:
      - method: POST
        name: optinmemberforcompliance
        description: LinkedIn Opt in Member for Compliance Monitoring
        call: compliance-events-compliance-authorization.optinmemberforcompliance
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: checkmemberregulationstatus
        description: LinkedIn Check Member Regulation Status
        call: compliance-events-compliance-authorization.checkmemberregulationstatus
        with:
          q: rest.q
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/membercomplianceauthorizations/developerapplication-urn-li-developerapplication-developerapplicationid-member-urn-li-person-personid
      name: v2-membercomplianceauthorizations-developerapplication-urn-li-developerapplicati
      description: REST surface for v2-memberComplianceAuthorizations-developerApplication=urn:li:developerApplicati.
      operations:
      - method: DELETE
        name: optoutmemberfromcompliance
        description: LinkedIn Opt Out Member from Compliance Monitoring
        call: compliance-events-compliance-authorization.optoutmemberfromcompliance
        with:
          DeveloperApplicationId: rest.DeveloperApplicationId
          PersonId: rest.PersonId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: compliance-events-compliance-authorization-mcp
    port: 9090
    transport: http
    description: MCP adapter for LinkedIn Compliance Events API — Compliance Authorization. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: linkedin-opt-member-compliance-monitoring
      description: LinkedIn Opt in Member for Compliance Monitoring
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: compliance-events-compliance-authorization.optinmemberforcompliance
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: linkedin-check-member-regulation-status
      description: LinkedIn Check Member Regulation Status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: compliance-events-compliance-authorization.checkmemberregulationstatus
      with:
        q: tools.q
      outputParameters:
      - type: object
        mapping: $.
    - name: linkedin-opt-out-member-compliance
      description: LinkedIn Opt Out Member from Compliance Monitoring
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: compliance-events-compliance-authorization.optoutmemberfromcompliance
      with:
        DeveloperApplicationId: tools.DeveloperApplicationId
        PersonId: tools.PersonId
      outputParameters:
      - type: object
        mapping: $.
