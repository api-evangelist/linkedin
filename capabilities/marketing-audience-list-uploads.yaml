naftiko: 1.0.0-alpha2
info:
  label: LinkedIn Marketing Audiences API — List Uploads
  description: 'LinkedIn Marketing Audiences API — List Uploads. 1 operations. Lead operation: LinkedIn Attach Uploaded List
    to DMP Segment. Self-contained Naftiko capability covering one Linkedin business surface.'
  tags:
  - Linkedin
  - List Uploads
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    LINKEDIN_API_KEY: LINKEDIN_API_KEY
capability:
  consumes:
  - type: http
    namespace: marketing-audience-list-uploads
    baseUri: https://api.linkedin.com/rest
    description: LinkedIn Marketing Audiences API — List Uploads business capability. Self-contained, no shared references.
    resources:
    - name: dmpSegments-ListUploadSegmentId-listUploads
      path: /dmpSegments/{ListUploadSegmentId}/listUploads
      operations:
      - name: attachlisttosegment
        method: POST
        description: LinkedIn Attach Uploaded List to DMP Segment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: LinkedIn-Version
          in: header
          type: string
          required: true
        - name: X-Restli-Protocol-Version
          in: header
          type: string
          required: true
        - name: ListUploadSegmentId
          in: path
          type: string
          description: ID of the list upload DMP segment
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.LINKEDIN_API_KEY}}'
  exposes:
  - type: rest
    namespace: marketing-audience-list-uploads-rest
    port: 8080
    description: REST adapter for LinkedIn Marketing Audiences API — List Uploads. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/dmpsegments/{listuploadsegmentid}/listuploads
      name: dmpsegments-listuploadsegmentid-listuploads
      description: REST surface for dmpSegments-ListUploadSegmentId-listUploads.
      operations:
      - method: POST
        name: attachlisttosegment
        description: LinkedIn Attach Uploaded List to DMP Segment
        call: marketing-audience-list-uploads.attachlisttosegment
        with:
          LinkedIn-Version: rest.LinkedIn-Version
          X-Restli-Protocol-Version: rest.X-Restli-Protocol-Version
          ListUploadSegmentId: rest.ListUploadSegmentId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: marketing-audience-list-uploads-mcp
    port: 9090
    transport: http
    description: MCP adapter for LinkedIn Marketing Audiences API — List Uploads. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: linkedin-attach-uploaded-list-dmp
      description: LinkedIn Attach Uploaded List to DMP Segment
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: marketing-audience-list-uploads.attachlisttosegment
      with:
        LinkedIn-Version: tools.LinkedIn-Version
        X-Restli-Protocol-Version: tools.X-Restli-Protocol-Version
        ListUploadSegmentId: tools.ListUploadSegmentId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
