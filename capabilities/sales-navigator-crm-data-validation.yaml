naftiko: 1.0.0-alpha2
info:
  label: LinkedIn Sales Navigator API — CRM Data Validation
  description: 'LinkedIn Sales Navigator API — CRM Data Validation. 2 operations. Lead operation: LinkedIn Create CRM Data
    Validation Export Job. Self-contained Naftiko capability covering one Linkedin business surface.'
  tags:
  - Linkedin
  - CRM Data Validation
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    LINKEDIN_API_KEY: LINKEDIN_API_KEY
capability:
  consumes:
  - type: http
    namespace: sales-navigator-crm-data-validation
    baseUri: https://api.linkedin.com/v2
    description: LinkedIn Sales Navigator API — CRM Data Validation business capability. Self-contained, no shared references.
    resources:
    - name: crmDataValidationExportJobs
      path: /crmDataValidationExportJobs
      operations:
      - name: createcrmdatavalidationexportjob
        method: POST
        description: LinkedIn Create CRM Data Validation Export Job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: crmInstanceId
          in: query
          type: string
          description: An URN containing the instance ID of the CRM to execute against. The URN must be URL encoded.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: crmDataValidationExportJobs-JobId
      path: /crmDataValidationExportJobs/{JobId}
      operations:
      - name: getcrmdatavalidationexportjob
        method: GET
        description: LinkedIn Get CRM Data Validation Export Job Status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: JobId
          in: path
          type: integer
          description: The ID of the export job
          required: true
        - name: crmInstanceId
          in: query
          type: string
          description: An URN containing the instance ID of the CRM. The URN must be URL encoded.
          required: true
    authentication:
      type: bearer
      token: '{{env.LINKEDIN_API_KEY}}'
  exposes:
  - type: rest
    namespace: sales-navigator-crm-data-validation-rest
    port: 8080
    description: REST adapter for LinkedIn Sales Navigator API — CRM Data Validation. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/crmdatavalidationexportjobs
      name: crmdatavalidationexportjobs
      description: REST surface for crmDataValidationExportJobs.
      operations:
      - method: POST
        name: createcrmdatavalidationexportjob
        description: LinkedIn Create CRM Data Validation Export Job
        call: sales-navigator-crm-data-validation.createcrmdatavalidationexportjob
        with:
          crmInstanceId: rest.crmInstanceId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/crmdatavalidationexportjobs/{jobid}
      name: crmdatavalidationexportjobs-jobid
      description: REST surface for crmDataValidationExportJobs-JobId.
      operations:
      - method: GET
        name: getcrmdatavalidationexportjob
        description: LinkedIn Get CRM Data Validation Export Job Status
        call: sales-navigator-crm-data-validation.getcrmdatavalidationexportjob
        with:
          JobId: rest.JobId
          crmInstanceId: rest.crmInstanceId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: sales-navigator-crm-data-validation-mcp
    port: 9090
    transport: http
    description: MCP adapter for LinkedIn Sales Navigator API — CRM Data Validation. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: linkedin-create-crm-data-validation
      description: LinkedIn Create CRM Data Validation Export Job
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: sales-navigator-crm-data-validation.createcrmdatavalidationexportjob
      with:
        crmInstanceId: tools.crmInstanceId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: linkedin-get-crm-data-validation
      description: LinkedIn Get CRM Data Validation Export Job Status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: sales-navigator-crm-data-validation.getcrmdatavalidationexportjob
      with:
        JobId: tools.JobId
        crmInstanceId: tools.crmInstanceId
      outputParameters:
      - type: object
        mapping: $.
