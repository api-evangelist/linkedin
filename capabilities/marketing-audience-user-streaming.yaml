naftiko: 1.0.0-alpha2
info:
  label: LinkedIn Marketing Audiences API — User Streaming
  description: 'LinkedIn Marketing Audiences API — User Streaming. 1 operations. Lead operation: LinkedIn Stream User Data
    to Segment. Self-contained Naftiko capability covering one Linkedin business surface.'
  tags:
  - Linkedin
  - User Streaming
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    LINKEDIN_API_KEY: LINKEDIN_API_KEY
capability:
  consumes:
  - type: http
    namespace: marketing-audience-user-streaming
    baseUri: https://api.linkedin.com/rest
    description: LinkedIn Marketing Audiences API — User Streaming business capability. Self-contained, no shared references.
    resources:
    - name: dmpSegments-UserSegmentId-users
      path: /dmpSegments/{UserSegmentId}/users
      operations:
      - name: streamuserstosegment
        method: POST
        description: LinkedIn Stream User Data to Segment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: LinkedIn-Version
          in: header
          type: string
          required: true
        - name: X-Restli-Protocol-Version
          in: header
          type: string
          required: true
        - name: X-RestLi-Method
          in: header
          type: string
          required: true
        - name: UserSegmentId
          in: path
          type: string
          description: ID of the user DMP segment
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.LINKEDIN_API_KEY}}'
  exposes:
  - type: rest
    namespace: marketing-audience-user-streaming-rest
    port: 8080
    description: REST adapter for LinkedIn Marketing Audiences API — User Streaming. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/dmpsegments/{usersegmentid}/users
      name: dmpsegments-usersegmentid-users
      description: REST surface for dmpSegments-UserSegmentId-users.
      operations:
      - method: POST
        name: streamuserstosegment
        description: LinkedIn Stream User Data to Segment
        call: marketing-audience-user-streaming.streamuserstosegment
        with:
          LinkedIn-Version: rest.LinkedIn-Version
          X-Restli-Protocol-Version: rest.X-Restli-Protocol-Version
          X-RestLi-Method: rest.X-RestLi-Method
          UserSegmentId: rest.UserSegmentId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: marketing-audience-user-streaming-mcp
    port: 9090
    transport: http
    description: MCP adapter for LinkedIn Marketing Audiences API — User Streaming. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: linkedin-stream-user-data-segment
      description: LinkedIn Stream User Data to Segment
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: marketing-audience-user-streaming.streamuserstosegment
      with:
        LinkedIn-Version: tools.LinkedIn-Version
        X-Restli-Protocol-Version: tools.X-Restli-Protocol-Version
        X-RestLi-Method: tools.X-RestLi-Method
        UserSegmentId: tools.UserSegmentId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
