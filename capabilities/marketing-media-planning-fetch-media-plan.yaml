naftiko: 1.0.0-alpha2
info:
  label: Media Planning — Fetch Media Plan
  description: 'Media Planning — Fetch Media Plan. 1 operations. Lead operation: LinkedIn Forecast Avg Lifetime Frequency.
    Self-contained Naftiko capability covering one Linkedin business surface.'
  tags:
  - Linkedin
  - Fetch Media Plan
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    LINKEDIN_API_KEY: LINKEDIN_API_KEY
capability:
  consumes:
  - type: http
    namespace: marketing-media-planning-fetch-media-plan
    baseUri: https://api.linkedin.com
    description: Media Planning — Fetch Media Plan business capability. Self-contained, no shared references.
    resources:
    - name: mediaPlanning
      path: /mediaPlanning
      operations:
      - name: postforecastavglifetimefrequency
        method: POST
        description: LinkedIn Forecast Avg Lifetime Frequency
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
        - name: X-RestLi-Protocol-Version
          in: header
          type: string
        - name: Linkedin-Version
          in: header
          type: string
        - name: action
          in: query
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: marketing-media-planning-fetch-media-plan-rest
    port: 8080
    description: REST adapter for Media Planning — Fetch Media Plan. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/mediaplanning
      name: mediaplanning
      description: REST surface for mediaPlanning.
      operations:
      - method: POST
        name: postforecastavglifetimefrequency
        description: LinkedIn Forecast Avg Lifetime Frequency
        call: marketing-media-planning-fetch-media-plan.postforecastavglifetimefrequency
        with:
          Authorization: rest.Authorization
          X-RestLi-Protocol-Version: rest.X-RestLi-Protocol-Version
          Linkedin-Version: rest.Linkedin-Version
          action: rest.action
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: marketing-media-planning-fetch-media-plan-mcp
    port: 9090
    transport: http
    description: MCP adapter for Media Planning — Fetch Media Plan. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: linkedin-forecast-avg-lifetime-frequency
      description: LinkedIn Forecast Avg Lifetime Frequency
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: marketing-media-planning-fetch-media-plan.postforecastavglifetimefrequency
      with:
        Authorization: tools.Authorization
        X-RestLi-Protocol-Version: tools.X-RestLi-Protocol-Version
        Linkedin-Version: tools.Linkedin-Version
        action: tools.action
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
