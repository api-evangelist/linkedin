naftiko: 1.0.0-alpha2
info:
  label: LinkedIn Marketing Campaign Management API — Creative Management
  description: 'LinkedIn Marketing Campaign Management API — Creative Management. 1 operations. Lead operation: LinkedIn Create
    Creative. Self-contained Naftiko capability covering one Linkedin business surface.'
  tags:
  - Linkedin
  - Creative Management
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    LINKEDIN_API_KEY: LINKEDIN_API_KEY
capability:
  consumes:
  - type: http
    namespace: marketing-campaigns-creative-management
    baseUri: https://api.linkedin.com/rest
    description: LinkedIn Marketing Campaign Management API — Creative Management business capability. Self-contained, no
      shared references.
    resources:
    - name: creatives
      path: /creatives
      operations:
      - name: createcreative
        method: POST
        description: LinkedIn Create Creative
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.LINKEDIN_API_KEY}}'
  exposes:
  - type: rest
    namespace: marketing-campaigns-creative-management-rest
    port: 8080
    description: REST adapter for LinkedIn Marketing Campaign Management API — Creative Management. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/creatives
      name: creatives
      description: REST surface for creatives.
      operations:
      - method: POST
        name: createcreative
        description: LinkedIn Create Creative
        call: marketing-campaigns-creative-management.createcreative
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: marketing-campaigns-creative-management-mcp
    port: 9090
    transport: http
    description: MCP adapter for LinkedIn Marketing Campaign Management API — Creative Management. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: linkedin-create-creative
      description: LinkedIn Create Creative
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: marketing-campaigns-creative-management.createcreative
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
