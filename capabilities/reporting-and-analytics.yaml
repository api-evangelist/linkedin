naftiko: 1.0.0-alpha2
info:
  label: LinkedIn Reporting And Analytics
  description: Unified workflow for marketing analysts to access ad analytics, B2B metrics, learning activity reports, and
    performance data -- combining reporting/ROI and learning activity APIs.
  tags:
  - LinkedIn
  - Reporting
  - Analytics
  - Learning
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    LINKEDIN_OAUTH_TOKEN: LINKEDIN_OAUTH_TOKEN
capability:
  consumes:
  - type: http
    namespace: marketing-reporting-roi
    baseUri: https://api.linkedin.com
    description: LinkedIn Reporting and ROI API.
    authentication:
      type: bearer
      token: '{{LINKEDIN_OAUTH_TOKEN}}'
    resources:
    - name: ad-analytics
      path: /adAnalytics
      description: Ad analytics and performance reporting.
      operations:
      - name: get-ad-analytics
        method: GET
        description: Retrieve ad analytics by various pivots and dimensions.
        inputParameters:
        - name: q
          in: query
          type: string
          required: false
          description: Query type (analytics or statistics)
        - name: pivot
          in: query
          type: string
          required: false
          description: Pivot dimension
        - name: dateRange
          in: query
          type: string
          required: false
          description: Date range
        - name: timeGranularity
          in: query
          type: string
          required: false
          description: Time granularity
        - name: accounts
          in: query
          type: string
          required: false
          description: Account URNs
        - name: fields
          in: query
          type: string
          required: false
          description: Fields to return
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: learning-activity-reports
    baseUri: https://api.linkedin.com
    description: LinkedIn Learning Activity Reports API.
    authentication:
      type: bearer
      token: '{{LINKEDIN_OAUTH_TOKEN}}'
    resources:
    - name: learning-activity-reports
      path: /v2/learningActivityReports
      description: Learning activity reports including completions, views, and logins.
      operations:
      - name: get-learning-activity-reports
        method: GET
        description: Retrieve learning activity reports aggregated by account, group, individual, or content.
        inputParameters:
        - name: q
          in: query
          type: string
          required: true
          description: Query type
        - name: startedAt
          in: query
          type: integer
          required: true
          description: Start timestamp in milliseconds since epoch
        - name: timeOffset.unit
          in: query
          type: string
          required: true
          description: Time offset unit (DAY, WEEK, MONTH)
        - name: timeOffset.duration
          in: query
          type: integer
          required: true
          description: Time offset duration
        - name: aggregationCriteria.primary
          in: query
          type: string
          required: true
          description: Primary aggregation criteria (ACCOUNT, GROUP, INDIVIDUAL, CONTENT)
        - name: count
          in: query
          type: integer
          required: false
          description: Number of results to return
        - name: start
          in: query
          type: integer
          required: false
          description: Starting index for pagination
        - name: contentSource
          in: query
          type: string
          required: false
          description: Source of learning content
        - name: referer
          in: header
          type: string
          required: false
          description: Referrer URN for the request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8083
    namespace: reporting-analytics-api
    description: Unified REST API for LinkedIn reporting and analytics.
    resources:
    - path: /v1/ad-analytics
      name: ad-analytics
      operations:
      - method: GET
        name: get-ad-analytics
        description: Retrieve ad analytics by various pivots.
        call: marketing-reporting-roi.get-ad-analytics
    - path: /v1/learning-activity-reports
      name: learning-activity-reports
      operations:
      - method: GET
        name: get-learning-activity-reports
        description: Retrieve learning activity reports.
        call: learning-activity-reports.get-learning-activity-reports
  - type: mcp
    port: 9093
    namespace: reporting-analytics-mcp
    transport: http
    description: MCP server for AI-assisted LinkedIn reporting and analytics.
    tools:
    - name: get-ad-analytics
      description: Retrieve ad analytics by various pivots and dimensions.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-reporting-roi.get-ad-analytics
    - name: get-learning-activity-reports
      description: Retrieve learning activity reports aggregated by account, group, individual, or content.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: learning-activity-reports.get-learning-activity-reports
