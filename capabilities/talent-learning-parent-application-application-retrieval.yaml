naftiko: 1.0.0-alpha2
info:
  label: LinkedIn Parent Application Management API — Application Retrieval
  description: 'LinkedIn Parent Application Management API — Application Retrieval. 1 operations. Lead operation: LinkedIn
    Get Child Application. Self-contained Naftiko capability covering one Linkedin business surface.'
  tags:
  - Linkedin
  - Application Retrieval
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    LINKEDIN_API_KEY: LINKEDIN_API_KEY
capability:
  consumes:
  - type: http
    namespace: talent-learning-parent-application-application-retrieval
    baseUri: https://api.linkedin.com
    description: LinkedIn Parent Application Management API — Application Retrieval business capability. Self-contained, no
      shared references.
    resources:
    - name: v2-provisionedApplications
      path: /v2/provisionedApplications
      operations:
      - name: getchildapplication
        method: GET
        description: LinkedIn Get Child Application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.LINKEDIN_API_KEY}}'
  exposes:
  - type: rest
    namespace: talent-learning-parent-application-application-retrieval-rest
    port: 8080
    description: REST adapter for LinkedIn Parent Application Management API — Application Retrieval. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/v2/provisionedapplications
      name: v2-provisionedapplications
      description: REST surface for v2-provisionedApplications.
      operations:
      - method: GET
        name: getchildapplication
        description: LinkedIn Get Child Application
        call: talent-learning-parent-application-application-retrieval.getchildapplication
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: talent-learning-parent-application-application-retrieval-mcp
    port: 9090
    transport: http
    description: MCP adapter for LinkedIn Parent Application Management API — Application Retrieval. One tool per consumed
      operation, routed inline through this capability's consumes block.
    tools:
    - name: linkedin-get-child-application
      description: LinkedIn Get Child Application
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: talent-learning-parent-application-application-retrieval.getchildapplication
      outputParameters:
      - type: object
        mapping: $.
