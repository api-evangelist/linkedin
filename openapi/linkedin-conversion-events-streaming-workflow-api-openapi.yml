              schema:
                $ref: '#/components/schemas/AssociateCampaignsToConversionResponse204'
      operationId: putAssociateCampaignsToConversion
      x-microcks-operation:
        dispatcher: FALLBACK
        dispatcherRules: '{}'
        delay: 0
  /conversionEvents:
