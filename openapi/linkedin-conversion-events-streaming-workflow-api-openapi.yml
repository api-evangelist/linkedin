      tags:
      - Conversion Events Streaming Workflow
      summary: LinkedIn 10. Stream Multiple Conversion Events to the Conversion Rule
      description: Create one or more conversion rules with this endpoint and set `conversionMethod` to `CONVERSIONS_API` for streaming conversions through API.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StreamMultipleConversionEventsRequest'
      parameters:
      - name: LinkedIn-Version
        in: header
        schema:
          type: string
        example: '{{insert_version}}'
      - name: X-Restli-Protocol-Version
        in: header
        schema:
          type: string
        example: 2.0.0
      - name: X-RestLi-Method
        in: header
        schema:
          type: string
        example: BATCH_CREATE
      responses:
        '200':
