      operationId: postStreamMultipleConversionEvents
      x-microcks-operation:
        dispatcher: FALLBACK
        dispatcherRules: '{}'
        delay: 0
components:
  schemas:
    AssociateCampaignsToConversionResponse204:
      type: string
    CreateANewConversionRequest:
