      x-microcks-operation:
        dispatcher: FALLBACK
        dispatcherRules: '{}'
        delay: 0
  /mediaPlanning:
    post:
      tags:
      - Fetch Media Plan
      summary: Forecast Avg Lifetime Frequency
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForecastAvgLifetimeFrequencyRequest'
      parameters:
      - name: Authorization
        in: header
        schema:
          type: string
        example: Bearer {{Access_Token}}
      - name: X-RestLi-Protocol-Version
        in: header
        schema:
          type: string
        example: 2.0.0
      - name: Linkedin-Version
        in: header
        schema:
          type: string
        example: '{{insert_version}}'
      - name: action
        in: query
        schema:
          type: string
        example: forecastImpressions
      responses:
        undefined:
          content:
            text/plain:
              examples:
                default:
                  $ref: '#/components/examples/ForecastAvgLifetimeFrequencyResponseundefinedExample'
              schema:
                $ref: '#/components/schemas/ForecastAvgLifetimeFrequencyResponseundefined'
      operationId: postForecastAvgLifetimeFrequency
      x-microcks-operation:
        dispatcher: FALLBACK
        dispatcherRules: '{}'
        delay: 0
