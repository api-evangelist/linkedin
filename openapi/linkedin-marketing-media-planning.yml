          type: integer
        example: '0'
      - name: count
        in: query
        schema:
          type: integer
        example: '10'
      responses:
        '200':
          description: OK
          headers:
            Content-Type:
              schema:
                type: string
                example: application/json
            X-RestLi-Protocol-Version:
              schema:
                type: string
                example: 2.0.0
            Date:
              schema:
                type: string
                example: Tue, 22 Aug 2023 19:18:41 GMT
            X-Li-Fabric:
              schema:
