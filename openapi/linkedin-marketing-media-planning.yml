openapi: 3.1.0
info:
  title: Media Planning
  description: "## Overview\n\nMedia Planning API can help Media Planners understand the reach and ROI that LinkedIn can offer\
    \ to their client. It allows them to make budget allocation recommendations with confidence and know how to improve the\
    \ results, even before spending the first dollar. Media Planning API helps Media Planners make that decision by giving\
    \ the forecasted reach, impressions (and more in future, like clicks, leads) curve over the budget, based on inputs provided\
    \ like targeted audience, campaign start/end date and more.\n\nNote: This is a private API that is available to qualified\
    \ developers who meet additional criteria for access. To learn more about eligibility qualifications and how to request\
    \ access, please see the [FAQ](https://learn.microsoft.com/en-us/linkedin/marketing/lms-faq#how-do-i-get-access-to-media-planning-api-product).\
    \ If you wish to apply for access, please submit a [Zendesk support ticket](https://linkedin.zendesk.com/).\n\n## Permissions\n\
    \nMedia Planning API requires a [3-legged OAuth](https://learn.microsoft.com/en-us/linkedin/shared/authentication/authorization-code-flow)\
    \ member token and your developer application needs to be provisioned with the Media Planning API product. Once you have\
    \ been approved to access, you can use any valid member access token associated with the authenticated user with any valid\
    \ scope permissions for member authentication. If there is no valid member token for the relevant user from any previous\
    \ integration, we recommend using the bare minimum scope permissions like `r_ads` which will be required to fetch authenticated\
    \ user's ad accounts.  \nNote: This API is application-specific; hence, explicit member consent is not required. Any valid\
    \ member access token associated with the authenticated user can be used, and you do not need to add any additional permission\
    \ in the scope of your Oauth2 flow for authorization.\n\nThis collection aims to focus on different Media Planning use\
    \ cases and should be used with the **media-planning-env-versioning** environment.\n\n\\--All requests for the Media Planning\
    \ API collection are in the Restli 2.0 format--"
  version: 1.0.0
servers:
- url: https://api.linkedin.com
  description: LinkedIn Marketing API Production Server
tags:
- name: Ad Targeting Entities
  description: 'The LinkedIn ads platform allows advertisers to target different types of audiences on the professional network.
    The two core concepts for targeting are facets and entities.


    Facets are high-level categories of the types of targeting available to you. Facets contain multiple entities which are
    the specific demographic values within that facet. For example, Industries is a facet. Specific industries such as Computer
    Software, Biotechnology, and Telecommunications are entities within the Industries facet.


    Use facets to narrow down your intended audience. Refer to [Targeting Criteria Facet URNs](https://learn.microsoft.com/en-us/linkedin/shared/references/v2/ads/targeting-criteria-facet-urns?view=li-lms-2023-09)
    for the list of available facets and their URNs. The `adTargetingFacets` API returns available targeting facets.


    Once you''ve identified the facet type(s) you''d like to target, you can fetch their entity values. Use the `adTargetingEntities`
    API to fetch available options for each facet type. To learn more, see [Ad Targeting Entities](https://learn.microsoft.com/en-us/linkedin/shared/references/v2/ads/adtargetingentities?context=linkedin%2Fmarketing%2Fcontex&view=li-lms-2023-09).


    ### Permissions


    Any application approved for the LinkedIn Marketing API Program can make these API calls using any 3-legged access token.
    No additional permissions need to be requested during the OAuth flow.'
- name: Fetch Media Plan
  description: Media Planning API can help Media Planners understand the reach and ROI that LinkedIn can offer to their client.
    It allows them to make budget allocation recommendations with confidence and know how to improve the results, even before
    spending the first dollar. Media Planning API helps Media Planners make that decision by giving the forecasted reach,
    impressions (and more in future, like clicks, leads) curve over the budget, based on inputs provided like targeted audience,
    campaign start/end date and more.
paths:
  /adTargetingFacets:
    get:
      tags:
      - Ad Targeting Entities
      summary: Get a list of available Ad Targeting Facets
      parameters:
      - name: LinkedIn-Version
        in: header
        schema:
          type: string
        example: '{{insert_version}}'
      - name: X-Restli-Protocol-Version
        in: header
        schema:
          type: string
        example: 2.0.0
      responses:
        '200':
          description: OK
          headers:
            Content-Type:
              schema:
                type: string
                example: application/json
            X-RestLi-Protocol-Version:
              schema:
                type: string
                example: 2.0.0
            Date:
              schema:
                type: string
                example: Tue, 22 Aug 2023 01:34:20 GMT
            Transfer-Encoding:
              schema:
                type: string
                example: chunked
            Connection:
              schema:
                type: string
                example: keep-alive
            X-Li-Fabric:
              schema:
                type: string
                example: prod-lva1
            X-Li-Pop:
              schema:
                type: string
                example: prod-lva1-x
            X-LI-Proto:
              schema:
                type: string
                example: http/1.1
            X-LI-UUID:
              schema:
                type: string
                example: AAYDeP50GndIRiDUNqZFNA==
            Set-Cookie:
              schema:
                type: string
                example: lidc="b=VB52:s=V:r=V:a=V:p=V:g=3817:u=1714:x=1:i=1692668060:t=1692748247:v=2:sig=AQEExcZ9-g2kMBwFJV4hRYBz8S5UhRNr"
            X-LI-Route-Key:
              schema:
                type: string
                example: '"b=VB52:s=V:r=V:a=V:p=V:g=3817:u=1714:x=1:i=1692668060:t=1692748247:v=2:sig=AQEExcZ9-g2kMBwFJV4hRYBz8S5UhRNr"'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAListOfResponse200'
              examples:
                default:
                  $ref: '#/components/examples/GetAListOfResponse200Example'
      operationId: getGetAListOf
      x-microcks-operation:
        dispatcher: FALLBACK
        dispatcherRules: '{}'
        delay: 0
  /adTargetingEntities:
    get:
      tags:
      - Ad Targeting Entities
      summary: Get Bing Geo locations using search typeahead
      parameters:
      - name: LinkedIn-Version
        in: header
        schema:
          type: string
        example: '{{insert_version}}'
      - name: X-Restli-Protocol-Version
        in: header
        schema:
          type: string
        example: 2.0.0
      - name: q
        in: query
        schema:
          type: string
        example: typeahead
      - name: query
