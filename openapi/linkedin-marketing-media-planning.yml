            count:
              type: integer
            links:
              type: array
              items: {}
        elements:
          type: array
          items:
            type: object
            properties:
              entityTypes:
                type: array
                items:
                  type: string
              facetName:
                type: string
              availableEntityFinders:
                type: array
                items:
                  type: string
    GetBingGeoLocationsResponse200:
      type: object
      properties:
        paging:
          type: object
          properties:
            start:
              type: integer
            count:
              type: integer
            links:
              type: array
              items:
                type: object
                properties:
                  type:
                    type: string
                  rel:
                    type: string
                  href:
                    type: string
        elements:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              urn:
                type: string
              facetUrn:
                type: string
    ForecastAvgLifetimeFrequencyRequest:
      type: object
      example:
        request:
          sponsoredAccountUrn: urn:li:sponsoredAccount:{{sponsoredaccount_id}}
          targetingCriteria:
            include:
              and:
              - or:
                  urn:li:adTargetingFacet:ageRanges:
                  - urn:li:ageRange:(18,24)
              - or:
                  urn:li:adTargetingFacet:locations:
                  - urn:li:geo:103644278
          targetBudgetMicros: 300000000
          optimizationType: MAX_REACH
          objectiveType: BRAND_AWARENESS
          enableAudienceExpansion: true
          enableAudienceNetwork: true
          startDateOn:
            day: 1
            month: 4
            year: 2024
          endDateOn:
            day: 1
            month: 5
            year: 2024
    ForecastAvgLifetimeFrequencyResponseundefined:
      type: string
