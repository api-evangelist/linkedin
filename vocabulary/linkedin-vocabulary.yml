- term: Use Cases > Social Actions Notifications
  description: The Organization Social Actions Notifications API enables your app to notify members about activity on their
    LinkedIn Company Pages. Use this API to build real-time streams for activity on LinkedIn Company Pages.
- term: Use Cases > Social Actions Notifications > Organization Social Actions Notifications - Pull Workflow
  description: Notifications for the authenticated member’s organizations can be queried using a criteria finder. Notifications
    are retained and available to pull for 60 days.
